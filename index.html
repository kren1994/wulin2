                normalized.sort((a, b) => {
                    if (a.x !== b.x) return a.x - b.x;
                    if (a.y !== b.y) return a.y - b.y;
                    return a.color.localeCompare(b.color);
                });

                const hash = normalized.map(m => `${m.color[0]}${m.x},${m.y}`).join(';');
                if (minHash === null || hash < minHash) {
                    minHash = hash;
                }
            }
            return minHash;
        }

        function validateOfferMove(x, y) {
            if (isOccupied(x, y)) {
                return i18n('errOfferOccupied');
            }
            if (state.opening.offeredMoves.some((move) => move.x === x && move.y === y)) {
                return i18n('errOfferDuplicated');
            }
            
            const candidateMoves = state.moves.concat([{ x, y, color: 'black' }]);
            const candidateHash = getShapeHash(candidateMoves);
            
            const isSymmetric = state.opening.offeredMoves.some(offer => {
                const existingMoves = state.moves.concat([{ x: offer.x, y: offer.y, color: 'black' }]);
                const existingHash = getShapeHash(existingMoves);
                return candidateHash === existingHash;
            });
            
            if (isSymmetric) {
                return i18n('errOfferSymmetric');
            }
            return '';
        }

        function finishGame(winnerId, resultText, logText = '') {
            if (!state) return;
            state.winnerId = winnerId || null;
            state.resultText = resultText;
            state.drawOfferByPeerId = '';
            state.takebackOfferByPeerId = '';
            state.connectionPause = null;
            if (logText) addLog('system', logText);
            resetReadyFlags();
            setPhase('finished');
            resetReviewMoves();
        }

        function setReadyState(peerId, ready) {
            if (!state || !peerId) return i18n('errNotReadyState');
            const participant = getParticipantById(peerId);
            if (!participant || (participant.seat !== 'black' && participant.seat !== 'white')) {
                return i18n('errReadyPlayerOnly');
            }
            if (state.status === 'playing') {
                return i18n('errReadyNotPlaying');
            }
            state.readyByPeerId[peerId] = Boolean(ready);
            maybeStartMatch();
            return '';
        }

        function placeMove(peerId, x, y, timestamp = Date.now()) {
            const originalPhase = state?.phase || '';
            const implicitPhase = getImplicitMovePhase(originalPhase);
            if (implicitPhase) {
                const swapDescriptor = phaseDescriptor();
                if (peerId !== swapDescriptor.actorPeerId) {
                    return i18n('errNotYourTurn');
                }
                state.phase = implicitPhase;
            }

            const descriptor = phaseDescriptor();
            if (!descriptor.allowBoardAction || descriptor.boardActionKind !== 'move') {
                if (implicitPhase) state.phase = originalPhase;
                return i18n('errNotBoardAction');
            }
            if (peerId !== descriptor.actorPeerId) {
                if (implicitPhase) state.phase = originalPhase;
                return i18n('errNotYourTurn');
            }
            if (isOccupied(x, y)) {
                if (implicitPhase) state.phase = originalPhase;
                return i18n('errReviewOccupied');
            }
            if (!validateMoveConstraint(descriptor.constraint, x, y)) {
                if (implicitPhase) state.phase = originalPhase;
                return i18n('errConstraintOut');
            }

            applyElapsedTime(timestamp);
            
            const color = getColorForPeer(peerId);
            const moveNumber = state.moves.length + 1;
            state.moves.push({ x, y, color, peerId, number: moveNumber });
            grantIncrement(peerId);

            switch (state.phase) {
                case 'opening-move-1': setPhase('swap-after-1', timestamp); break;
                case 'opening-move-2': setPhase('swap-after-2', timestamp); break;
                case 'opening-move-3': setPhase('swap-after-3', timestamp); break;
                case 'opening-move-4': setPhase('swap-after-4', timestamp); break;
                case 'opening-move-5-choice1': setPhase('swap-after-5', timestamp); break;
                case 'opening-move-6-choice1':
                case 'opening-move-6-choice2':
                case 'regular': setPhase('regular', timestamp); break;
                default: break;
            }
            return '';
        }

        function resolveSwap(peerId, shouldSwap, timestamp = Date.now()) {
            const descriptor = phaseDescriptor();
            if (!state || !state.phase.startsWith('swap-after-')) return i18n('errCannotSwap');
            if (peerId !== descriptor.actorPeerId) return i18n('errNotSwapTurn');

            applyElapsedTime(timestamp);
            if (shouldSwap) {
                swapColors();
            }

            if (state.phase === 'swap-after-1') setPhase('opening-move-2', timestamp);
            if (state.phase === 'swap-after-2') setPhase('opening-move-3', timestamp);
            if (state.phase === 'swap-after-3') setPhase('opening-move-4', timestamp);
            if (state.phase === 'swap-after-4') setPhase('opening-move-5-choice1', timestamp);
            if (state.phase === 'swap-after-5') setPhase('opening-move-6-choice1', timestamp);
            return '';
        }

        function chooseBranch(peerId, branch, timestamp = Date.now()) {
            const descriptor = phaseDescriptor();
            if (state?.phase !== 'swap-after-4') return i18n('errCannotChoice');
            if (peerId !== descriptor.actorPeerId) return i18n('errOnlyBlackChoice');
            if (branch !== 'choice2') return '';

            applyElapsedTime(timestamp);
            state.opening.variant = branch;
            state.opening.offeredMoves = [];
            setPhase('offering-choice2', timestamp);
            return '';
        }

        function offerMove(peerId, x, y, timestamp = Date.now()) {
            const descriptor = phaseDescriptor();
            if (state?.phase !== 'offering-choice2') return i18n('errNotOfferPhase');
            if (peerId !== descriptor.actorPeerId) return i18n('errOnlyBlackOffer');
            const error = validateOfferMove(x, y);
            if (error) return error;

            applyElapsedTime(timestamp);
            state.opening.offeredMoves.push({ x, y });
            
            if (state.opening.offeredMoves.length >= 10) {
                setPhase('select-offer', timestamp);
            } else {
                setPhase('offering-choice2', timestamp);
            }
            return '';
        }

        function selectOfferedMove(peerId, x, y, timestamp = Date.now()) {
            const descriptor = phaseDescriptor();
            if (state?.phase !== 'select-offer') return i18n('errNotSelectPhase');
            if (peerId !== descriptor.actorPeerId) return i18n('errOnlyWhiteSelect');
            const selected = state.opening.offeredMoves.find((move) => move.x === x && move.y === y);
            if (!selected) return i18n('errSelectFromOffers');

            applyElapsedTime(timestamp);
            const blackPeerId = getBlackPeerId();
            const moveNumber = state.moves.length + 1;
            state.moves.push({ x: selected.x, y: selected.y, color: 'black', peerId: blackPeerId, number: moveNumber, offered: true });
            state.opening.offeredMoves = [];
            
            setPhase('opening-move-6-choice2', timestamp);
            return '';
        }

        function getDrawRequestError(peerId) {
            if (!state || state.status !== 'playing') return i18n('errDrawPlayingOnly');
            const participant = getParticipantById(peerId);
            if (!participant || (participant.seat !== 'black' && participant.seat !== 'white')) {
                return i18n('errDrawPlayerOnly');
            }
            const descriptor = phaseDescriptor();
            if (descriptor.actorPeerId === peerId) {
                return i18n('errDrawNotYourTurn');
            }

            const opponentPeerId = getOpponentPeerId(peerId);
            if (!opponentPeerId) return i18n('errDrawNoOpponent');

            if (state.drawOfferByPeerId === peerId) {
                return i18n('errDrawAlready');
            }
            return '';
        }

        function offerDraw(peerId) {
            const requestError = getDrawRequestError(peerId);
            if (requestError) return requestError;
            const opponentPeerId = getOpponentPeerId(peerId);

            if (state.drawOfferByPeerId === opponentPeerId) {
                finishGame('', i18n('msgDraw'), i18n('msgDrawLog'));
                return '';
            }

            state.drawOfferByPeerId = peerId;
            return '';
        }

        function respondDraw(peerId, accept) {
            if (!state || state.status !== 'playing') return i18n('errDrawCannotRespond');
            const offerPeerId = state.drawOfferByPeerId;
            if (!offerPeerId) return i18n('errDrawNoOffer');
            const opponentPeerId = getOpponentPeerId(offerPeerId);
            if (peerId !== opponentPeerId) return i18n('errDrawOnlyOpponentRespond');

            if (accept) {
                finishGame('', i18n('msgDraw'), i18n('msgDrawLog'));
                return '';
            }

            state.drawOfferByPeerId = '';
            return '';
        }

        function getTakebackRequestError(peerId) {
            if (!state || state.status !== 'playing') return i18n('errTakebackPlayingOnly');
            const participant = getParticipantById(peerId);
            if (!participant || (participant.seat !== 'black' && participant.seat !== 'white')) {
                return i18n('errTakebackPlayerOnly');
            }
            if ((state.moves || []).length <= 6) return i18n('errTakebackTooEarly');
            const opponentPeerId = getOpponentPeerId(peerId);
            if (!opponentPeerId) return i18n('errTakebackNoOpponent');
            if (state.takebackOfferByPeerId) return i18n('errTakebackAlready');
            return '';
        }

        function requestTakeback(peerId) {
            const requestError = getTakebackRequestError(peerId);
            if (requestError) return requestError;
            state.takebackOfferByPeerId = peerId;
            return '';
        }

        function applyTakeback(peerId, timestamp = Date.now()) {
            if (!state || !state.moves?.length) return;
            applyElapsedTime(timestamp);
            do {
                state.moves.pop();
            } while (state.moves.length && state.moves[state.moves.length - 1].peerId === peerId);
            state.opening.offeredMoves = [];
            state.drawOfferByPeerId = '';
            state.takebackOfferByPeerId = '';
            displayMoveCount = -1;
            setPhase('regular', timestamp);
        }

        function respondTakeback(peerId, accept) {
            if (!state || state.status !== 'playing') return i18n('errTakebackCannotRespond');
            const offerPeerId = state.takebackOfferByPeerId;
            if (!offerPeerId) return i18n('errTakebackNoOffer');
            const opponentPeerId = getOpponentPeerId(offerPeerId);
            if (peerId !== opponentPeerId) return i18n('errTakebackOnlyOpponentRespond');
            if (!accept) {
                state.takebackOfferByPeerId = '';
                return '';
            }
            applyTakeback(offerPeerId);
            return '';
        }

        function resignGame(peerId) {
            if (!state || state.status !== 'playing') return i18n('errResignPlayingOnly');
            const participant = getParticipantById(peerId);
            if (!participant || (participant.seat !== 'black' && participant.seat !== 'white')) {
                return i18n('errResignPlayerOnly');
            }
            const opponentPeerId = getOpponentPeerId(peerId);
            finishGame(opponentPeerId, i18n('msgWin', getPeerName(opponentPeerId)), i18n('msgAgreedEndLog'));
            return '';
        }

        function addComment(peerId, text) {
            if (!state) return i18n('errUnconnected');
            const participant = getParticipantById(peerId);
            if (!participant) return i18n('errUnconnected');
            const message = normalizeCommentText(text);
            if (!message) return i18n('errNeedComment');
            addLog('comment', `${participant.name}\n${message}`);
            return '';
        }

        function applyHostAction(peerId, action) {
            if (!state || !action) return;
            let error = '';
            const pausedBlockedActions = [
                'move', 'swap', 'choice2', 'draw', 'draw-response', 'takeback', 'takeback-response',
                'resign', 'offer', 'select-offer', 'ready'
            ];
            if (hasDisconnectedSeatedPlayer() && pausedBlockedActions.includes(action.kind)) {
                error = i18n('errMatchPausedForDisconnect');
            }

            if (!error && action.kind === 'move') error = placeMove(peerId, action.x, action.y);
            if (!error && action.kind === 'swap') error = resolveSwap(peerId, true);
            if (!error && action.kind === 'choice2') error = chooseBranch(peerId, 'choice2');
            if (!error && action.kind === 'draw') error = offerDraw(peerId);
            if (!error && action.kind === 'draw-response') error = respondDraw(peerId, Boolean(action.accept));
            if (!error && action.kind === 'takeback') error = requestTakeback(peerId);
            if (!error && action.kind === 'takeback-response') error = respondTakeback(peerId, Boolean(action.accept));
            if (!error && action.kind === 'resign') error = resignGame(peerId);
            if (!error && action.kind === 'comment') error = addComment(peerId, action.text);
            if (!error && action.kind === 'review-move') error = addReviewMove(peerId, action.x, action.y);
            if (!error && action.kind === 'review-cursor') error = setReviewCursor(peerId, action.cursor);
            if (!error && action.kind === 'review-undo') error = setReviewCursor(peerId, (state.reviewCursor ?? (state.reviewMoves || []).length) - 1);
            if (!error && action.kind === 'review-reset') error = resetReviewMovesForPeer(peerId);
            if (!error && action.kind === 'offer') error = offerMove(peerId, action.x, action.y);
            if (!error && action.kind === 'select-offer') error = selectOfferedMove(peerId, action.x, action.y);
            if (!error && action.kind === 'ready') error = setReadyState(peerId, Boolean(action.ready));
            if (!error && action.kind === 'seat-change') {
                const isHostOperator = peerId === state.hostPeerId;
                const isSelfSeatChange = action.targetPeerId === peerId && canSelfChangeSeat(peerId, action.seat);
                if (!isHostOperator && !isSelfSeatChange) {
                    error = i18n('errOnlyEmptySeat');
                } else {
                    error = assignSeat(action.targetPeerId, action.seat);
                }
            }

            if (error) {
                if (peerId === localPeerId) showToast(error);
                if (peerId !== localPeerId) {
                    const targetConn = guestConnections.get(peerId);
                    if (targetConn && targetConn.open) {
                        targetConn.send({ type: 'notice', message: error });
                    }
                }
                return;
            }

            if (['move', 'offer', 'select-offer', 'review-move'].includes(action.kind) && peerId !== localPeerId) {
                playStoneSound(false);
            }

            if (['move', 'swap', 'choice2', 'offer', 'select-offer', 'takeback-response'].includes(action.kind)) {
                displayMoveCount = -1;
            }
            if (['review-move', 'review-cursor', 'review-undo', 'review-reset'].includes(action.kind)) {
                displayMoveCount = -1;
            }

            if (peerId === localPeerId && action.kind === 'draw' && state.drawOfferByPeerId === peerId) {
                showToast(i18n('msgDrawOffered'));
            }
            if (peerId === localPeerId && action.kind === 'takeback' && state.takebackOfferByPeerId === peerId) {
                showToast(i18n('msgTakebackRequested'));
            }

            if (action.kind === 'comment') {
                broadcastLogEntry(state.log?.[0]);
                persistRoomStateSnapshot();
                renderLog();
                return;
            }

            state.version = (state.version || 0) + 1;
            if (action.kind === 'move') {
                persistRoomStateSnapshot();
                broadcastMoveEvent(action);
                render();
                return;
            }

            broadcastState();
            render();
        }

        function sendAction(action) {
            if (!state) return;
            if (!localPeerId) {
                showToast(i18n('errUnconnected'));
                return;
            }
            const pausedBlockedActions = [
                'move', 'swap', 'choice2', 'draw', 'draw-response', 'takeback', 'takeback-response',
                'resign', 'offer', 'select-offer', 'ready'
            ];
            if (hasDisconnectedSeatedPlayer() && pausedBlockedActions.includes(action.kind)) {
                showToast(i18n('errMatchPausedForDisconnect'));
                return;
            }
            if (localMode === 'host') {
                applyHostAction(localPeerId, action);
                return;
            }
            if (!hostConnection || !hostConnection.open) {
                showToast(i18n('errNoHostConnection'));
                return;
            }
            if (action.kind === 'move') {
                action = { ...action, requestId: createRequestId() };
                setPendingMove(action);
            }
            if ((action.kind === 'draw' || action.kind === 'takeback') && !applyOptimisticRequest(action.kind)) {
                return;
            }
            hostConnection.send({ type: 'action', action });
        }

        function canLocalResign() {
            if (!state || state.status !== 'playing') return false;
            const localParticipant = getParticipantById(localPeerId);
            return Boolean(localParticipant && (localParticipant.seat === 'black' || localParticipant.seat === 'white'));
        }

        function openResignConfirm() {
            if (!canLocalResign()) return;
            resignConfirmOpen = true;
            renderResignConfirm();
        }

        function closeResignConfirm() {
            resignConfirmOpen = false;
            renderResignConfirm();
        }

        function renderResignConfirm() {
            const visible = resignConfirmOpen && canLocalResign();
            elements.resignConfirm.hidden = !visible;
        }

        function broadcastState() {
            if (localMode !== 'host' || !state) return;
            persistRoomStateSnapshot();
            guestConnections.forEach((connection) => {
                if (connection && connection.open) {
                    connection.send({ type: 'state', state });
                }
            });
        }

        function createMoveAppliedEvent(action) {
            const move = state.moves[state.moves.length - 1];
            return {
                kind: 'move-applied',
                version: state.version || 0,
                requestId: action.requestId || '',
                move,
                phase: state.phase,
                status: state.status,
                winnerId: state.winnerId,
                resultText: state.resultText,
                drawOfferByPeerId: state.drawOfferByPeerId,
                takebackOfferByPeerId: state.takebackOfferByPeerId,
                opening: state.opening,
                clocks: state.clocks,
                readyByPeerId: state.readyByPeerId,
                reviewMoves: state.status === 'finished' ? state.reviewMoves : null,
                reviewCursor: state.status === 'finished' ? state.reviewCursor : null,
            };
        }

        function broadcastMoveEvent(action) {
            if (localMode !== 'host' || !state) return;
            const event = createMoveAppliedEvent(action);
            guestConnections.forEach((connection) => {
                if (connection && connection.open) {
                    connection.send({ type: 'event', event });
                }
            });
        }

        function broadcastLogEntry(entry) {
            if (localMode !== 'host' || !state || !entry) return;
            const event = { kind: 'log-entry', entry };
            guestConnections.forEach((connection) => {
                if (connection && connection.open) {
                    connection.send({ type: 'event', event });
                }
            });
        }

        function requestSnapshot() {
            clearPendingMove();
            renderBoard();
            if (localMode === 'guest' && hostConnection && hostConnection.open) {
                hostConnection.send({ type: 'snapshot-request' });
            }
        }

        function isPendingMoveConfirmed(event) {
            return pendingMove && (
                pendingMove.requestId === event.requestId ||
                (event.move && pendingMove.peerId === event.move.peerId && pendingMove.x === event.move.x && pendingMove.y === event.move.y)
            );
        }

        function applyMoveEvent(event) {
            if (!state || !event || event.kind !== 'move-applied' || !event.move) return;

            const currentVersion = state.version || 0;
            const nextVersion = event.version || 0;
            if (nextVersion && nextVersion <= currentVersion) {
                if (isPendingMoveConfirmed(event)) clearPendingMove();
                renderBoard();
                return;
            }
            if (!Array.isArray(state.moves)) state.moves = [];
            if (nextVersion && nextVersion !== currentVersion + 1) {
                requestSnapshot();
                return;
            }
            if (state.moves.length !== event.move.number - 1) {
                requestSnapshot();
                return;
            }

            state.moves.push(event.move);
            if (event.move.peerId !== localPeerId) playStoneSound(false);

            state.phase = event.phase;
            state.status = event.status;
            state.winnerId = event.winnerId;
            state.resultText = event.resultText;
            state.drawOfferByPeerId = event.drawOfferByPeerId;
            state.takebackOfferByPeerId = event.takebackOfferByPeerId || '';
            state.opening = event.opening;
            state.clocks = event.clocks;
            state.readyByPeerId = event.readyByPeerId;
            state.version = nextVersion || currentVersion + 1;
            if (event.status === 'finished') {
                state.reviewMoves = event.reviewMoves || [];
                state.reviewCursor = event.reviewCursor ?? state.reviewMoves.length;
            }
            if (isPendingMoveConfirmed(event)) clearPendingMove();
            displayMoveCount = -1;
            persistRoomStateSnapshot();
            render();
        }

        function applyLogEntryEvent(event) {
            if (!state || !event || event.kind !== 'log-entry' || !event.entry) return;
            addLogEntry(event.entry);
            persistRoomStateSnapshot();
            renderLog();
        }

        function applyNetworkEvent(event) {
            if (!event) return;
            if (event.kind === 'move-applied') {
                applyMoveEvent(event);
                return;
            }
            if (event.kind === 'log-entry') {
                applyLogEntryEvent(event);
            }
        }

        function broadcastClocks() {
            if (localMode !== 'host' || !state) return;
            persistRoomStateSnapshot();
            guestConnections.forEach((connection) => {
                if (connection && connection.open) {
                    connection.send({ type: 'clock', clocks: state.clocks });
                }
            });
        }

        function updateShareLinkUi() {
            // Share-link controls are optional in this build.
        }

        function setConnectionLabel(text) {
            connectionState = text;
        }

        function applyHostTimeSettings() {
            if (!state || localMode !== 'host') return;
            if (state.status === 'playing') {
                elements.infoBaseMinutesInput.value = String(Math.round(state.config.baseSeconds / 60));
                elements.infoIncrementInput.value = String(state.config.incrementSeconds);
                showToast(i18n('errChangeTimePlaying'));
                return;
            }

            const baseMinutes = clamp(Number(elements.infoBaseMinutesInput.value) || 5, 1, 180);
            const incrementSeconds = clamp(Number(elements.infoIncrementInput.value) || 5, 0, 60);
            elements.infoBaseMinutesInput.value = String(baseMinutes);
            elements.infoIncrementInput.value = String(incrementSeconds);
            state.config.baseSeconds = baseMinutes * 60;
            state.config.incrementSeconds = incrementSeconds;
            Object.keys(state.clocks.remainingMsByPeerId).forEach((peerId) => {
                state.clocks.remainingMsByPeerId[peerId] = state.config.baseSeconds * 1000;
            });
            broadcastState();
            render();
        }

        function getSeatOccupant(seat) {
            const peerId = seat === 'black' ? getBlackPeerId() : getWhitePeerId();
            return peerId ? getParticipantById(peerId) : null;
        }

        function handleSeatButtonClick(seat) {
            const occupant = getSeatOccupant(seat);
            if (!occupant) {
                if (!canSelfChangeSeat(localPeerId, seat)) {
                    showToast(i18n('errSeatOccupied'));
                    return;
                }
                sendAction({ kind: 'seat-change', targetPeerId: localPeerId, seat });
                return;
            }
            if (occupant.id === localPeerId || localMode === 'host') {
                sendAction({ kind: 'seat-change', targetPeerId: occupant.id, seat: 'spectator' });
            }
        }

        function renderReadyButton(container, participant) {
            container.innerHTML = '';

            if (!participant) {
                const placeholder = document.createElement('span');
                placeholder.className = 'ready-mark passive';
                placeholder.textContent = '✓';
                placeholder.setAttribute('aria-hidden', 'true');
                container.appendChild(placeholder);
                return;
            }

            const isReady = Boolean(state.readyByPeerId?.[participant.id]);
            const isLocalSeat = participant.id === localPeerId;
            const canToggle = isLocalSeat && state.status !== 'playing';

            if (canToggle) {
                const readyButton = document.createElement('button');
                readyButton.type = 'button';
                readyButton.className = `ready-button${isReady ? ' active' : ''}`;
                readyButton.textContent = '✓';
                readyButton.title = isReady ? i18n('readyAriaCancel') : i18n('readyAriaTitle');
                readyButton.setAttribute('aria-label', readyButton.title);
                readyButton.addEventListener('pointerdown', (event) => {
                    if (event.pointerType === 'mouse' && event.button !== 0) return;
                    if (event.isPrimary === false) return;
                    event.preventDefault();
                    sendAction({ kind: 'ready', ready: !isReady });
                });
                container.appendChild(readyButton);
                return;
            }

            const readyMark = document.createElement('span');
            readyMark.className = `ready-mark passive${isReady ? ' active' : ''}`;
            readyMark.textContent = '✓';
            readyMark.setAttribute('aria-label', isReady ? i18n('readyAriaTitle') : i18n('readyAriaCancel'));
            container.appendChild(readyMark);
        }

        function renderDrawConfirm() {
            if (!state) {
                elements.drawConfirm.hidden = true;
                return;
            }
            const offerPeerId = state.drawOfferByPeerId;
            const localParticipant = getParticipantById(localPeerId);
            const isResponder = Boolean(
                offerPeerId &&
                state.status === 'playing' &&
                localParticipant &&
                (localParticipant.seat === 'black' || localParticipant.seat === 'white') &&
                localPeerId !== offerPeerId
            );
            elements.drawConfirm.hidden = !isResponder;
        }

        function renderTakebackConfirm() {
            if (!state) {
                elements.takebackConfirm.hidden = true;
                return;
            }
            const offerPeerId = state.takebackOfferByPeerId;
            const localParticipant = getParticipantById(localPeerId);
            const isResponder = Boolean(
                offerPeerId &&
                state.status === 'playing' &&
                localParticipant &&
                (localParticipant.seat === 'black' || localParticipant.seat === 'white') &&
                localPeerId !== offerPeerId
            );
            elements.takebackConfirm.hidden = !isResponder;
        }

        function destroyNetworkState() {
            clearHostReconnectTimer();
            guestConnections.forEach((connection) => {
                try { connection.close(); } catch (error) { }
            });
            guestConnections.clear();
            if (hostConnection) {
                try { hostConnection.close(); } catch (error) { }
                hostConnection = null;
            }
            if (peer) {
                try { peer.destroy(); } catch (error) { }
                peer = null;
            }
            roomId = '';
            localPeerId = '';
            localMode = 'idle';
            localPlayerToken = '';
            hasNotifiedHostLeaving = false;
            hostTakeoverInProgress = false;
            suppressLocalPeerClose = false;
            lastClockBroadcastBucket = null;
        }

        function notifyHostLeaving() {
            if (hasNotifiedHostLeaving) return;
            if (localMode !== 'guest') return;
            if (!hostConnection || !hostConnection.open) return;
            hasNotifiedHostLeaving = true;
            try {
                hostConnection.send({ type: 'bye' });
            } catch (error) {
                // Best-effort on tab close.
            }
        }

        function resetAppState() {
            persistRoomStateSnapshot();
            destroyNetworkState();
            state = null;
            setConnectionLabel('未接続');
            elements.leaveRoomBtn.disabled = true;
            setScreen('lobby');
            updateShareLinkUi();
            render();
        }

        function joinRoom() {
            if (peer) resetAppState();

            const roomCode = elements.roomCodeInput.value.trim();
            if (!roomCode) {
                showToast(i18n('errNeedRoomCode'));
                return;
            }

            const hostName = sanitizeName(elements.nameInput.value || 'Player');
            const settings = buildSettings();
            roomId = `${ROOM_PREFIX}${roomCode}`;
            localPlayerToken = getLocalPlayerToken(roomCode);
            
            setConnectionLabel(i18n('msgRoomConnecting'));
            setScreen('game');

            peer = new Peer(roomId);

            peer.on('open', (id) => {
                localMode = 'host';
                localPeerId = id;
                state = restoreLocalHostFromSnapshot(roomId, id, hostName, settings, localPlayerToken);
                elements.leaveRoomBtn.disabled = false;
                setConnectionLabel(i18n('msgRoomCreated'));
                render();
            });
            attachLocalPeerClose(peer);

            peer.on('connection', (incoming) => {
                if (localMode !== 'host') return;
                if (!state) {
                    incoming.on('open', () => incoming.send({ type: 'reject', message: 'Not initialized.' }));
                    incoming.on('open', () => incoming.close());
                    return;
                }
                const previousConnection = guestConnections.get(incoming.peer);
                if (previousConnection && previousConnection !== incoming) {
                    try { previousConnection.close(); } catch (error) { }
                }
                guestConnections.set(incoming.peer, incoming);
                wireConnectionHandlers(incoming);
            });

            peer.on('error', (error) => {
                if (error.type === 'unavailable-id') {
                    peer.destroy();
                    
                    peer = new Peer(undefined, { roomId });
                    peer.on('open', (id) => {
                        localMode = 'guest';
                        localPeerId = id;
                        hostConnection = peer.connect(roomId, { reliable: true, metadata: { name: hostName, token: localPlayerToken } });
                        wireConnectionHandlers(hostConnection);
                    });
                    attachLocalPeerClose(peer);
                    peer.on('error', (err) => {
                        if (err.type === 'network') {
                            showToast(i18n('errCommError'));
                            scheduleGuestReconnect(1200);
                            return;
                        }
                        showToast(`Error: ${err.type || err.message}`);
                        resetAppState();
                    });
                } else if (error.type === 'network') {
                    showToast(i18n('errCommError'));
                } else {
                    showToast(`Error: ${error.type || error.message}`);
                    resetAppState();
                }
            });
        }

        function wireConnectionHandlers(connection) {
            if (!connection) return;

            connection.on('open', () => {
                if (localMode === 'guest') {
                    setConnectionLabel(i18n('msgRoomSyncing'));
                    elements.leaveRoomBtn.disabled = false;
                    connection.send({ type: 'hello', name: sanitizeName(elements.nameInput.value || 'Player'), token: localPlayerToken });
                } else {
                    setConnectionLabel(i18n('msgRoomGuestConnecting'));
                }
            });

            connection.on('data', (message) => {
                if (!message || typeof message !== 'object') return;

                if (message.type === 'hello' && localMode === 'host') {
                    const nextName = sanitizeName(message.name || 'Player');
                    const token = String(message.token || connection.metadata?.token || '');
                    const reconnectParticipant = getDisconnectedSeatedParticipantByName(nextName);
                    const existing = getParticipantById(connection.peer);
                    if (reconnectParticipant && reconnectParticipant.id !== connection.peer) {
                        reconnectDisconnectedParticipant(reconnectParticipant.id, connection.peer, nextName, token);
                    } else if (!existing) {
                        state.participantsById[connection.peer] = { id: connection.peer, name: nextName, seat: 'spectator', isHost: false, token };
                        ensureJoinOrderContains(connection.peer);
                        ensureClockEntry(connection.peer);
                        addLog('presence', i18n('msgJoined', nextName));
                    } else if (existing.name !== nextName) {
                        existing.name = nextName;
                        if (token) existing.token = token;
                    }

                    broadcastState();
                    render();
                    return;
                }

                if (message.type === 'action' && localMode === 'host') {
                    applyHostAction(connection.peer, message.action);
                    return;
                }

                if (message.type === 'snapshot-request' && localMode === 'host') {
                    if (state && connection.open) connection.send({ type: 'state', state });
                    return;
                }

                if (message.type === 'bye' && localMode === 'host') {
                    const participant = getParticipantById(connection.peer);
                    if (participant) {
                        const wasSeated = participant.seat === 'black' || participant.seat === 'white';
                        if (!preserveDisconnectedParticipant(connection.peer)) {
                            if (wasSeated) {
                                addLog('presence', i18n('msgDisconnected', participant.name));
                            }
                            removeParticipant(connection.peer, i18n('msgLeft', participant.name));
                        }
                        broadcastState();
                        render();
                    }
                    return;
                }

                if (message.type === 'state') {
                    state = message.state;
                    persistRoomStateSnapshot();
                    clearPendingMove();
                    elements.leaveRoomBtn.disabled = false;
                    if (localMode === 'guest') {
                        roomId = state.roomId;
                        setConnectionLabel(i18n('msgRoomConnected'));
                    }
                    
                    if (displayMoveCount !== -1) {
                        const currentMax = getRenderedMoves().length;
                        if (displayMoveCount > currentMax) displayMoveCount = -1;
                    }
                    render();
                    return;
                }

                if (message.type === 'event') {
                    applyNetworkEvent(message.event);
                    return;
                }

                if (message.type === 'clock') {
                    if (!state || !message.clocks) return;
                    state.clocks = message.clocks;
                    renderPlayers();
                    return;
                }

                if (message.type === 'notice' && message.message) {
                    clearPendingMove();
                    clearLocalOptimisticRequests();
                    render();
                    showToast(message.message);
                    return;
                }

                if (message.type === 'reject') {
                    showToast(message.message);
                    resetAppState();
                }
            });

            connection.on('close', () => {
                if (localMode === 'host') {
                    setConnectionLabel(i18n('msgRoomClosed'));
                    if (guestConnections.get(connection.peer) === connection) {
                        guestConnections.delete(connection.peer);
                    }
                    if (suppressedConnectionClosePeers.delete(connection.peer)) {
                        return;
                    }
                    const participant = getParticipantById(connection.peer);
                    if (participant) {
                        const wasSeated = participant.seat === 'black' || participant.seat === 'white';
                        if (!preserveDisconnectedParticipant(connection.peer)) {
                            if (wasSeated) {
                                addLog('presence', i18n('msgDisconnected', participant.name));
                            }
                            removeParticipant(connection.peer, i18n('msgLeft', participant.name));
                        }
                        broadcastState();
                        render();
                    }
                } else if (localMode === 'guest' && connection === hostConnection) {
                    setConnectionLabel(i18n('msgRoomClosed'));
                    hostConnection = null;
                    handleGuestHostDisconnect();
                }
            });

            connection.on('error', () => {
                showToast(i18n('errCommError'));
                if (localMode === 'guest' && connection === hostConnection) {
                    scheduleGuestReconnect();
                }
            });
        }

        function leaveRoom() {
            const leavingRoomId = state?.roomId || roomId;
            resetAppState();
            clearRoomStateSnapshot(leavingRoomId);
            showToast(i18n('msgLeftRoom'));
        }

        function resizeBoard() {
            const container = document.getElementById('boardContainer');
            const wrap = document.getElementById('boardWrap');
            
            if (!container || !wrap) return;

            const containerRect = container.getBoundingClientRect();
            const size = Math.max(260, Math.floor(Math.min(containerRect.width, containerRect.height || containerRect.width)));

            wrap.style.width = size + 'px';
            wrap.style.height = size + 'px';

            const dpr = window.devicePixelRatio || 1;
            elements.boardCanvas.width = Math.floor(size * dpr);
            elements.boardCanvas.height = Math.floor(size * dpr);
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
            
            const smallScreenTopOffset = window.innerWidth <= 599 ? 5 / 620 : 0;
            let baseMargin, horizontalMargin, bottomMargin, topMargin, rightMargin;
            
            if (showCoords) {
                baseMargin = Math.max(24, Math.round(size * (35 / 620)));
                horizontalMargin = Math.max(30, Math.round(size * (43 / 620)));
                bottomMargin = Math.max(30, Math.round(size * (43 / 620)));
                topMargin = Math.max(18, Math.round(size * ((25 / 620) + smallScreenTopOffset)));
                rightMargin = Math.max(18, Math.round(size * (25 / 620)));
            } else {
                horizontalMargin = Math.max(15, Math.round(size * (20 / 620)));
                bottomMargin = horizontalMargin;
                topMargin = horizontalMargin + (window.innerWidth <= 599 ? Math.round(size * (5 / 620)) : 0);
                rightMargin = horizontalMargin;
                baseMargin = horizontalMargin;
            }

            const playableWidth = size - horizontalMargin - rightMargin;
            const playableHeight = size - topMargin - bottomMargin;
            const cell = Math.min(playableWidth, playableHeight) / (BOARD_SIZE - 1);
            const coordinateGap = Math.max(18, Math.round(baseMargin * 0.82));
            
            boardGeometry = {
                size,
                padding: horizontalMargin,
                topPadding: topMargin,
                rightPadding: rightMargin,
                bottomPadding: bottomMargin,
                coordinateGap,
                cell,
            };
            renderBoard();
        }

        function drawConstraintHighlight(descriptor) {
            if (!boardGeometry || !descriptor?.constraint) return;
            const { padding, topPadding, cell } = boardGeometry;
            ctx.save();
            ctx.strokeStyle = 'rgba(22, 70, 59, 0.48)';
            ctx.fillStyle = 'rgba(22, 70, 59, 0.08)';
            ctx.lineWidth = 2;
            ctx.setLineDash([10, 8]);

            if (descriptor.constraint.kind === 'center') {
                const x = padding + CENTER * cell;
                const y = topPadding + CENTER * cell;
                ctx.beginPath();
                ctx.arc(x, y, cell * 0.52, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
            }

            if (descriptor.constraint.kind === 'square') {
                const radius = descriptor.constraint.radius;
                const left = padding + (CENTER - radius) * cell - cell * 0.5;
                const top = topPadding + (CENTER - radius) * cell - cell * 0.5;
                const side = (radius * 2 + 1) * cell;
                ctx.beginPath();
                ctx.roundRect(left, top, side, side, 18);
                ctx.fill();
                ctx.stroke();
            }
            ctx.restore();
        }

        function drawOfferedMoves() {
            if (!state || !boardGeometry || !state.opening.offeredMoves.length) return;
            const descriptor = phaseDescriptor();
            const { padding, topPadding, cell } = boardGeometry;
            ctx.save();
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.font = `${Math.floor(cell * 0.42)}px Segoe UI`;
            
            const isSelectPhase = descriptor.boardActionKind === 'select-offer';

            state.opening.offeredMoves.forEach((move, index) => {
                const x = padding + move.x * cell;
                const y = topPadding + move.y * cell;
                ctx.beginPath();
                
                if (isSelectPhase) {
                    ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
                    ctx.arc(x, y, cell * 0.22, 0, Math.PI * 2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = 'rgba(28, 26, 24, 0.18)';
                    ctx.strokeStyle = 'rgba(38, 33, 30, 0.45)';
                    ctx.lineWidth = 2;
                    ctx.arc(x, y, cell * 0.34, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.stroke();
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                    ctx.fillText(String(index + 1), x, y + 1);
                }
            });
            ctx.restore();
        }

        function drawStones() {
            if (!state || !boardGeometry) return;
            const { padding, topPadding, cell } = boardGeometry;
            ctx.save();
            
            const allMoves = getRenderedMoves();
            const count = displayMoveCount === -1 ? allMoves.length : displayMoveCount;
            const moves = allMoves.slice(0, count);

            moves.forEach((move, index) => {
                const x = padding + move.x * cell;
                const y = topPadding + move.y * cell;
                
                ctx.beginPath(); 
                ctx.arc(x, y, cell * 0.45, 0, Math.PI * 2);
                ctx.fillStyle = move.color === 'black' ? '#000' : '#fff'; 
                ctx.fill();
                ctx.lineWidth = 1; 
                ctx.strokeStyle = '#333'; 
                ctx.stroke();

                if (showMoveNumbers) {
                    const moveText = String(index + 1);
                    const moveTextY = y + Math.max(1, Math.round(cell * 0.03));
                    ctx.fillStyle = move.color === 'black' ? '#eee' : '#333';
                    const textLen = moveText.length;
                    const baseRatio = textLen >= 3 ? 0.3 : (textLen === 2 ? 0.38 : 0.45);
                    const fontSize = Math.max(10, Math.floor(cell * baseRatio));
                    ctx.font = `600 ${fontSize}px 'Segoe UI', 'Yu Gothic UI', Meiryo, sans-serif`;
                    ctx.textAlign = 'center'; 
                    ctx.textBaseline = 'middle';
                    ctx.lineWidth = 2.5;
                    ctx.strokeStyle = move.color === 'black' ? 'rgba(0, 0, 0, 0.55)' : 'rgba(255, 255, 255, 0.9)';
                    ctx.strokeText(moveText, x, moveTextY);
                    ctx.fillText(moveText, x, moveTextY);
                }
            });

            const canShowPendingMove = pendingMove
                && state.status === 'playing'
                && displayMoveCount === -1
                && !moves.some((move) => move.x === pendingMove.x && move.y === pendingMove.y);
            if (canShowPendingMove) {
                const x = padding + pendingMove.x * cell;
                const y = topPadding + pendingMove.y * cell;
                ctx.save();
                ctx.globalAlpha = 0.58;
                ctx.beginPath();
                ctx.arc(x, y, cell * 0.45, 0, Math.PI * 2);
                ctx.fillStyle = pendingMove.color === 'black' ? '#000' : '#fff';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 4]);
                ctx.strokeStyle = pendingMove.color === 'black' ? 'rgba(255,255,255,0.9)' : 'rgba(0,0,0,0.45)';
                ctx.stroke();
                if (showMoveNumbers) {
                    const moveText = String(pendingMove.number);
                    const moveTextY = y + Math.max(1, Math.round(cell * 0.03));
                    ctx.setLineDash([]);
                    ctx.fillStyle = pendingMove.color === 'black' ? '#eee' : '#333';
                    const textLen = moveText.length;
                    const baseRatio = textLen >= 3 ? 0.3 : (textLen === 2 ? 0.38 : 0.45);
                    const fontSize = Math.max(10, Math.floor(cell * baseRatio));
                    ctx.font = `600 ${fontSize}px 'Segoe UI', 'Yu Gothic UI', Meiryo, sans-serif`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(moveText, x, moveTextY);
                }
                ctx.restore();
            }
            ctx.restore();
        }

        function renderBoard() {
            if (!boardGeometry) return;
            const { size, padding, topPadding, rightPadding, bottomPadding, coordinateGap, cell } = boardGeometry;
            ctx.clearRect(0, 0, size, size);

            const theme = boardThemes[boardThemeIndex];
            const boardGradient = ctx.createLinearGradient(0, 0, size, size);
            boardGradient.addColorStop(0, theme.grad1);
            boardGradient.addColorStop(1, theme.grad2);
            ctx.fillStyle = boardGradient;
            ctx.fillRect(0, 0, size, size);

            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            for (let index = 0; index < 8; index += 1) {
                ctx.fillRect(index * size / 8, 0, 1, size);
            }

            ctx.save();
            ctx.strokeStyle = 'rgba(63, 42, 19, 0.9)';
            ctx.lineWidth = 1.2;
            for (let line = 0; line < BOARD_SIZE; line += 1) {
                const x = padding + line * cell;
                const y = topPadding + line * cell;
                ctx.beginPath();
                ctx.moveTo(padding, y);
                ctx.lineTo(padding + (BOARD_SIZE - 1) * cell, y);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(x, topPadding);
                ctx.lineTo(x, topPadding + (BOARD_SIZE - 1) * cell);
                ctx.stroke();
            }

            STAR_POINTS.forEach(([x, y]) => {
                ctx.beginPath();
                ctx.fillStyle = 'rgba(51, 33, 17, 0.82)';
                ctx.arc(padding + x * cell, topPadding + y * cell, cell * 0.1, 0, Math.PI * 2);
                ctx.fill();
            });

            if (showCoords) {
                ctx.fillStyle = 'rgba(63, 42, 19, 0.84)';
                ctx.font = `${Math.max(12, Math.floor(cell * 0.34))}px "Yu Gothic UI", Meiryo, sans-serif`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                for (let index = 0; index < BOARD_SIZE; index += 1) {
                    const x = padding + index * cell;
                    const y = topPadding + index * cell;
                    ctx.fillText(LETTERS[index], x, size - bottomPadding + coordinateGap);
                    ctx.fillText(String(BOARD_SIZE - index), padding - coordinateGap, y);
                }
            }
            ctx.restore();

            if (displayMoveCount === -1 || displayMoveCount === getRenderedMoves().length) {
                drawConstraintHighlight(phaseDescriptor());
                drawOfferedMoves();
            }
            drawStones();
        }

        function boardPointFromEvent(event) {
            if (!boardGeometry) return null;
            const rect = elements.boardCanvas.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return null;
            const scaleX = boardGeometry.size / rect.width;
            const scaleY = boardGeometry.size / rect.height;
            const x = (event.clientX - rect.left) * scaleX;
            const y = (event.clientY - rect.top) * scaleY;
            
            const { padding, topPadding, cell } = boardGeometry;
            const ix = Math.round((x - padding) / cell);
            const iy = Math.round((y - topPadding) / cell);
            if (ix < 0 || iy < 0 || ix >= BOARD_SIZE || iy >= BOARD_SIZE) return null;
            const px = padding + ix * cell;
            const py = topPadding + iy * cell;
            const hitRadius = Math.max(cell * 0.58, isTouchMain() ? 12 : 0);
            if (Math.hypot(px - x, py - y) > hitRadius) return null;
            return { x: ix, y: iy };
        }

        function handleBoardPointerDown(event) {
            if (event.pointerType === 'mouse' && event.button !== 0) return;
            if (event.isPrimary === false) return;
            event.preventDefault();
            if (!state) return;
            
            if (displayMoveCount !== -1 && displayMoveCount !== getRenderedMoves().length) {
                displayMoveCount = -1;
                renderBoard();
                return;
            }

            const point = boardPointFromEvent(event);
            if (!point) return;
            if (hasDisconnectedSeatedPlayer() && !canUseReviewBoard()) {
                showToast(i18n('errMatchPausedForDisconnect'));
                return;
            }
            if (canUseReviewBoard()) {
                playStoneSound(true);
                sendAction({ kind: 'review-move', x: point.x, y: point.y });
                return;
            }
            const descriptor = phaseDescriptor();
            if (!descriptor.allowBoardAction) return;
            if (descriptor.actorPeerId !== localPeerId) {
                showToast(i18n('errNotYourTurnBoard'));
                return;
            }

            if (descriptor.boardActionKind === 'move') {
                if (pendingMove) return;
                playStoneSound(true);
                sendAction({ kind: 'move', x: point.x, y: point.y });
            }
            if (descriptor.boardActionKind === 'offer') {
                playStoneSound(true);
                sendAction({ kind: 'offer', x: point.x, y: point.y });
            }
            if (descriptor.boardActionKind === 'select-offer') {
                playStoneSound(true);
                sendAction({ kind: 'select-offer', x: point.x, y: point.y });
            }
        }

        function handleBoardContextMenu(event) {
            event.preventDefault();
            if (displayMoveCount !== -1 && displayMoveCount !== getRenderedMoves().length) {
                displayMoveCount = -1;
                renderBoard();
                return;
            }
            if (!canUseReviewBoard()) return;
            if (!boardPointFromEvent(event)) return;
            sendAction({ kind: 'review-undo' });
        }

        function renderRoomSummary() {
            if (!state) {
                elements.roomSummary.textContent = `5 ${i18n('minute')} + 5 ${i18n('second')}`;
                elements.timeEditor.hidden = true;
                elements.roomSummary.hidden = false;
                return;
            }

            const settings = state.config;
            elements.roomSummary.textContent = `${Math.round(settings.baseSeconds / 60)} ${i18n('minute')} + ${settings.incrementSeconds} ${i18n('second')}`;
            elements.timeEditor.hidden = localMode !== 'host' || state.status === 'playing';
            elements.roomSummary.hidden = localMode === 'host' && !elements.timeEditor.hidden;
            if (localMode === 'host') {
                elements.infoBaseMinutesInput.value = String(Math.round(settings.baseSeconds / 60));
                elements.infoIncrementInput.value = String(settings.incrementSeconds);
                elements.infoBaseMinutesInput.disabled = false;
                elements.infoIncrementInput.disabled = false;
            }
        }

        function renderPlayers() {
            if (!state) {
                elements.blackPlayerName.textContent = i18n('playerNotJoined');
                elements.whitePlayerName.textContent = i18n('playerNotJoined');
                elements.blackPlayerTimer.textContent = '';
                elements.whitePlayerTimer.textContent = '';
                elements.blackSeatBtn.textContent = '＋';
                elements.whiteSeatBtn.textContent = '＋';
                elements.blackSeatBtn.disabled = true;
                elements.whiteSeatBtn.disabled = true;
                elements.blackSeatBtn.hidden = false;
                elements.whiteSeatBtn.hidden = false;
                [elements.blackReadyWrap, elements.whiteReadyWrap].forEach((wrap) => {
                    wrap.innerHTML = '';
                    const placeholder = document.createElement('span');
                    placeholder.className = 'ready-mark passive';
                    placeholder.textContent = '✓';
                    placeholder.setAttribute('aria-hidden', 'true');
                    wrap.appendChild(placeholder);
                });
                elements.blackPlayerCard.classList.remove('active');
                elements.whitePlayerCard.classList.remove('active');
                return;
            }

            const blackParticipant = getSeatOccupant('black');
            const whiteParticipant = getSeatOccupant('white');
            const blackPeerId = blackParticipant?.id || '';
            const whitePeerId = whiteParticipant?.id || '';
            const activePeerId = state.clocks.activePeerId;

            function renderParticipantName(participant) {
                if (!participant) return i18n('playerNotJoined');
                const displayName = getDisplayName(participant);
                if (!isParticipantDisconnected(participant)) return displayName;
                return `${displayName} (${i18n('playerDisconnected', getDisconnectedRemainingSeconds(participant))})`;
            }

            elements.blackPlayerName.textContent = renderParticipantName(blackParticipant);
            elements.whitePlayerName.textContent = renderParticipantName(whiteParticipant);
            elements.blackPlayerTimer.textContent = blackPeerId ? formatTime(getDisplayRemainingMs(blackPeerId)) : '';
            elements.whitePlayerTimer.textContent = whitePeerId ? formatTime(getDisplayRemainingMs(whitePeerId)) : '';
            elements.blackSeatBtn.textContent = blackParticipant ? '－' : '＋';
            elements.whiteSeatBtn.textContent = whiteParticipant ? '－' : '＋';
            const canBlackSeatAction = blackParticipant ? (blackParticipant.id === localPeerId || localMode === 'host') : canSelfChangeSeat(localPeerId, 'black');
            const canWhiteSeatAction = whiteParticipant ? (whiteParticipant.id === localPeerId || localMode === 'host') : canSelfChangeSeat(localPeerId, 'white');
            elements.blackSeatBtn.disabled = !canBlackSeatAction;
            elements.whiteSeatBtn.disabled = !canWhiteSeatAction;
            elements.blackSeatBtn.hidden = false;
            elements.whiteSeatBtn.hidden = false;

            elements.blackPlayerCard.classList.toggle('active', activePeerId === blackPeerId && state.status === 'playing');
            elements.whitePlayerCard.classList.toggle('active', activePeerId === whitePeerId && state.status === 'playing');
            renderReadyButton(elements.blackReadyWrap, blackParticipant);
            renderReadyButton(elements.whiteReadyWrap, whiteParticipant);
        }

        function renderSeats() {
            elements.spectatorList.innerHTML = '';
            if (!state) {
                const item = document.createElement('li');
                item.className = 'spectator-item';
                item.textContent = i18n('spectatorEmpty');
                elements.spectatorList.appendChild(item);
                return;
            }

            const participants = Object.values(state.participantsById || {}).sort((left, right) => {
                const leftIsHost = isHostParticipant(left);
                const rightIsHost = isHostParticipant(right);
                if (leftIsHost && !rightIsHost) return -1;
                if (!leftIsHost && rightIsHost) return 1;
                return left.name.localeCompare(right.name, 'ja');
            });

            participants.forEach((participant) => {
                if (participant.seat !== 'spectator') return;
                const item = document.createElement('li');
                item.className = 'spectator-item';
                item.textContent = getDisplayName(participant);
                elements.spectatorList.appendChild(item);
            });

            if (!elements.spectatorList.childElementCount) {
                const item = document.createElement('li');
                item.className = 'spectator-item';
                item.textContent = i18n('spectatorNone');
                elements.spectatorList.appendChild(item);
            }
        }

        function renderControls() {
            const localParticipant = getParticipantById(localPeerId);
            const canManageResult = Boolean(state && state.status === 'playing' && !hasDisconnectedSeatedPlayer() && localParticipant && (localParticipant.seat === 'black' || localParticipant.seat === 'white'));
            
            elements.menuDrawBtn.disabled = !canManageResult || Boolean(state?.drawOfferByPeerId);
            elements.menuResignBtn.disabled = !canManageResult;
            elements.menuTakebackBtn.disabled = !canManageResult || Boolean(state?.takebackOfferByPeerId);
        }

        function renderActionDialog() {
            if (!state) {
                elements.actionConfirm.hidden = true;
                return;
            }
            const descriptor = phaseDescriptor();
            const isMyTurn = descriptor.actorPeerId && descriptor.actorPeerId === localPeerId;
            const isSwapOrChoice = isMyTurn && (state.phase.startsWith('swap-after-') || state.phase === 'choose-branch');
            
            if (dismissedActionDialogPhase !== state.phase) {
                dismissedActionDialogPhase = '';
            }

            if (isSwapOrChoice && !dismissedActionDialogPhase) {
                elements.actionConfirm.hidden = false;
                
                elements.actionConfirmButtons.innerHTML = '';
                
                if (state.phase.startsWith('swap-after-')) {
                    const btnSwap = document.createElement('button');
                    btnSwap.className = 'button button-warn';
                    btnSwap.textContent = i18n('actionDialogSwap');
                    btnSwap.onclick = () => { elements.actionConfirm.hidden = true; sendAction({ kind: 'swap' }); };
                    elements.actionConfirmButtons.appendChild(btnSwap);
                }
                
                const btnReg = document.createElement('button');
                btnReg.className = 'button button-secondary';
                btnReg.textContent = i18n('actionDialogRegular');
                btnReg.onclick = () => { 
                    elements.actionConfirm.hidden = true; 
                    dismissedActionDialogPhase = state.phase; 
                };
                elements.actionConfirmButtons.appendChild(btnReg);

                if (state.phase === 'choose-branch' || state.phase === 'swap-after-4') {
                    const btn10 = document.createElement('button');
                    btn10.className = 'button button-primary';
                    btn10.textContent = i18n('actionDialogChoice2');
                    btn10.onclick = () => { elements.actionConfirm.hidden = true; sendAction({ kind: 'choice2' }); };
                    elements.actionConfirmButtons.appendChild(btn10);
                }
                
            } else {
                elements.actionConfirm.hidden = true;
            }
        }

        function renderLog() {
            elements.logList.innerHTML = '';
            const logs = (state?.log || []).filter((entry) => entry.kind === 'presence' || entry.kind === 'comment' || entry.kind === 'system');
            if (!logs.length) {
                const item = document.createElement('li');
                item.className = 'log-item';
                item.textContent = i18n('chatNoMessages');
                elements.logList.appendChild(item);
                return;
            }

            logs.forEach((entry) => {
                const item = document.createElement('li');
                item.className = 'log-item';

                const head = document.createElement('div');
                head.className = 'log-head';
                if (entry.kind === 'comment') {
                    const [authorName] = String(entry.text || '').split('\n');
                    const author = document.createElement('span');
                    author.className = 'log-author';
                    author.textContent = authorName;
                    head.append(author);
                }

                const body = document.createElement('div');
                body.className = 'log-body';
                body.textContent = entry.kind === 'comment'
                    ? String(entry.text || '').split('\n').slice(1).join('\n')
                    : entry.text;

                if (head.childElementCount) item.append(head);
                item.append(body);
                elements.logList.appendChild(item);
            });
        }

        function submitLogComment() {
            const text = normalizeCommentText(elements.logCommentInput.value);
            if (!text) {
                showToast(i18n('errNeedComment'));
                return;
            }
            sendAction({ kind: 'comment', text });
            elements.logCommentInput.value = '';
        }

        function render() {
            setScreen(state || localMode !== 'idle' ? 'game' : 'lobby');
            renderRoomSummary();
            renderPlayers();
            renderControls();
            renderSeats();
            renderLog();
            renderDrawConfirm();
            renderTakebackConfirm();
            renderResignConfirm();
            renderActionDialog();
            renderBoard();
            updateShareLinkUi();
        }

        function periodicClockWork() {
            if (!state) return;

            if (localMode === 'host' && state.status === 'playing') {
                const expired = [state.seats.black, state.seats.white]
                    .map((peerId) => getParticipantById(peerId))
                    .find((participant) => isParticipantDisconnected(participant) && getDisconnectedRemainingSeconds(participant) <= 0);
                if (expired) {
                    const winnerId = getOpponentPeerId(expired.id);
                    finishGame(winnerId, i18n('msgDisconnectTimeout', expired.name), i18n('msgAgreedEndLog'));
                    broadcastState();
                    render();
                    return;
                }
            }

            if (state.status === 'playing' && state.clocks.activePeerId === localPeerId) {
                const remaining = getDisplayRemainingMs(localPeerId);
                const sec = Math.floor(remaining / 1000);
                if (lastReportedSec !== sec) {
                    if (lastReportedSec !== null && (sec === 10 || (sec <= 5 && sec >= 1))) {
                        playCountdownSound();
                    }
                    lastReportedSec = sec;
                }
            } else {
                lastReportedSec = null;
            }

            if (localMode === 'host' && state.status === 'playing' && state.clocks.activePeerId) {
                const remaining = getDisplayRemainingMs(state.clocks.activePeerId);
                if (remaining <= 0) {
                    applyElapsedTime();
                    const loserId = state.clocks.activePeerId;
                    const winnerId = getOpponentPeerId(loserId);
                    finishGame(winnerId, i18n('msgTimeout', getPeerName(loserId)), i18n('msgTimeoutLog'));
                    broadcastState();
                } else {
                    const bucket = Math.floor(remaining / 1000);
                    if (bucket !== lastClockBroadcastBucket) {
                        lastClockBroadcastBucket = bucket;
                        broadcastClocks();
                    }
                }
            }

            renderPlayers();
        }

        function toggleControlMenu(name) {
            const isAction = name === 'action';
            const menu = isAction ? document.getElementById('actionMenu') : document.getElementById('viewMenu');
            const btn = isAction ? document.getElementById('actionMenuBtn') : document.getElementById('viewMenuBtn');
            
            if (currentOpenControlMenu && currentOpenControlMenu !== name) {
                closeControlMenus();
            }
            
            if (menu.hidden) {
                menu.hidden = false;
                btn.classList.add('active');
                btn.setAttribute('aria-expanded', 'true');
                currentOpenControlMenu = name;
            } else {
                closeControlMenus();
            }
        }

        function closeControlMenus() {
            ['action', 'view'].forEach(name => {
                const menu = document.getElementById(name + 'Menu');
                const btn = document.getElementById(name + 'MenuBtn');
                if (menu) menu.hidden = true;
                if (btn) {
                    btn.classList.remove('active');
                    btn.setAttribute('aria-expanded', 'false');
                }
            });
            currentOpenControlMenu = null;
        }

        document.addEventListener('click', (e) => {
            if (!currentOpenControlMenu) return;
            const isAction = currentOpenControlMenu === 'action';
            const menu = isAction ? document.getElementById('actionMenu') : document.getElementById('viewMenu');
            const btn = isAction ? document.getElementById('actionMenuBtn') : document.getElementById('viewMenuBtn');
            if (btn.contains(e.target) || menu.contains(e.target)) return;
            closeControlMenus();
        });

        function offerDrawFromMenu() {
            closeControlMenus();
            sendAction({ kind: 'draw' });
        }

        function requestTakebackFromMenu() {
            closeControlMenus();
            sendAction({ kind: 'takeback' });
        }

        function resignFromMenu() {
            closeControlMenus();
            openResignConfirm();
        }

        function cycleLanguage() {
            closeControlMenus();
            currentLanguage = currentLanguage === 'ja' ? 'zh' : 'ja';
            document.getElementById('langBtn').dataset.value = currentLanguage === 'ja' ? '日' : '中';
            
            const label = boardThemes[boardThemeIndex].label[currentLanguage] || boardThemes[boardThemeIndex].label['ja'];
            document.getElementById('themeBtn').dataset.value = label;

            applyLanguage();
        }

        function toggleSound() {
            closeControlMenus();
            soundEnabled = !soundEnabled;
            document.getElementById('soundBtn').classList.toggle('active', soundEnabled);
            if (soundEnabled) initAudio();
        }

        function toggleCoords() {
            closeControlMenus();
            showCoords = !showCoords;
            document.getElementById('coordsBtn').classList.toggle('active', showCoords);
            resizeBoard();
        }

        function cycleTheme() {
            closeControlMenus();
            boardThemeIndex = (boardThemeIndex + 1) % boardThemes.length;
            const label = boardThemes[boardThemeIndex].label[currentLanguage] || boardThemes[boardThemeIndex].label['ja'];
            document.getElementById('themeBtn').dataset.value = label;
            renderBoard();
        }

        function toggleMoveNumbers() {
            closeControlMenus();
            showMoveNumbers = !showMoveNumbers;
            document.getElementById('moveNumBtn').classList.toggle('active', showMoveNumbers);
            renderBoard();
        }

        function resetMovesView() {
            if (!state) return;
            if (state.status === 'finished') {
                sendAction({ kind: 'review-reset' });
            } else {
                displayMoveCount = -1;
                renderBoard();
            }
        }

        function goMoves(delta) {
            if (!state) return;
            if (state.status === 'finished') {
                const max = (state.reviewMoves || []).length;
                let current = state.reviewCursor ?? max;
                current += delta;
                if (current < 0) current = 0;
                if (current > max) current = max;
                sendAction({ kind: 'review-cursor', cursor: current });
            } else {
                const max = getRenderedMoves().length;
                let current = displayMoveCount === -1 ? max : displayMoveCount;
                current += delta;
                if (current < 0) current = 0;
                if (current >= max) current = -1;
                displayMoveCount = current;
                renderBoard();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
            switch (e.key) {
                case 'ArrowLeft': e.preventDefault(); goMoves(-1); break;
                case 'ArrowRight': e.preventDefault(); goMoves(1); break;
                case 'ArrowUp': e.preventDefault(); goMoves(-4); break;
                case 'ArrowDown': e.preventDefault(); goMoves(4); break;
            }
        });

        function bindPointerPress(element, handler) {
            element.addEventListener('pointerdown', (event) => {
                if (event.pointerType === 'mouse' && event.button !== 0) return;
                if (event.isPrimary === false) return;
                event.preventDefault();
                handler(event);
            });
        }

        elements.joinRoomBtn.addEventListener('click', joinRoom);
        elements.roomCodeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') joinRoom();
        });
        
        elements.leaveRoomBtn.addEventListener('click', leaveRoom);
        bindPointerPress(elements.blackSeatBtn, () => handleSeatButtonClick('black'));
        bindPointerPress(elements.whiteSeatBtn, () => handleSeatButtonClick('white'));
        elements.infoBaseMinutesInput.addEventListener('change', applyHostTimeSettings);
        elements.infoIncrementInput.addEventListener('change', applyHostTimeSettings);
        bindPointerPress(elements.drawAcceptBtn, () => sendAction({ kind: 'draw-response', accept: true }));
        bindPointerPress(elements.drawDeclineBtn, () => sendAction({ kind: 'draw-response', accept: false }));
        bindPointerPress(elements.takebackAcceptBtn, () => sendAction({ kind: 'takeback-response', accept: true }));
        bindPointerPress(elements.takebackDeclineBtn, () => sendAction({ kind: 'takeback-response', accept: false }));
        bindPointerPress(elements.resignConfirmBtn, () => {
            closeResignConfirm();
            sendAction({ kind: 'resign' });
        });
        bindPointerPress(elements.resignCancelBtn, closeResignConfirm);
        bindPointerPress(document.getElementById('actionMenuBtn'), () => toggleControlMenu('action'));
        bindPointerPress(document.getElementById('viewMenuBtn'), () => toggleControlMenu('view'));
        bindPointerPress(elements.menuResignBtn, resignFromMenu);
        bindPointerPress(elements.menuDrawBtn, offerDrawFromMenu);
        bindPointerPress(elements.menuTakebackBtn, requestTakebackFromMenu);
        bindPointerPress(document.getElementById('langBtn'), cycleLanguage);
        bindPointerPress(document.getElementById('soundBtn'), toggleSound);
        bindPointerPress(document.getElementById('coordsBtn'), toggleCoords);
        bindPointerPress(document.getElementById('themeBtn'), cycleTheme);
        bindPointerPress(document.getElementById('moveNumBtn'), toggleMoveNumbers);
        elements.sendLogCommentBtn.addEventListener('click', submitLogComment);
        elements.logCommentInput.addEventListener('keydown', (event) => {
            if (event.key !== 'Enter' || event.isComposing) return;
            event.preventDefault();
            submitLogComment();
        });
        elements.boardCanvas.addEventListener('pointerdown', handleBoardPointerDown);
        elements.boardCanvas.addEventListener('contextmenu', handleBoardContextMenu);

        window.addEventListener('resize', () => {
            cancelAnimationFrame(resizeFrame);
            resizeFrame = requestAnimationFrame(resizeBoard);
        });

        window.addEventListener('pagehide', () => {
            notifyHostLeaving();
        });
        window.addEventListener('beforeunload', () => {
            notifyHostLeaving();
        });

        window.setInterval(periodicClockWork, 250);

        (() => {
            applyLanguage();
            resizeBoard();
            render();
        })();
    </script>
</body>
</html>
