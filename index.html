<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>wulin | 対局所</title>
    <style>
        :root {
            --bg: #f3efe6;
            --bg-accent: #e2d5bc;
            --panel: rgba(255, 252, 246, 0.88);
            --panel-strong: #fffaf1;
            --line: rgba(74, 54, 34, 0.18);
            --text: #2f2418;
            --muted: #7b6855;
            --accent: #17594a;
            --accent-strong: #0f4338;
            --accent-soft: rgba(23, 89, 74, 0.12);
            --warn: #a44b1f;
            --danger: #8b2f28;
            --shadow: 0 24px 60px rgba(63, 43, 21, 0.14);
            --radius-xl: 28px;
            --radius-lg: 18px;
            --radius-md: 12px;
            --radius-sm: 10px;
            --shell-padding: clamp(10px, 2vw, 18px);
            color: var(--text);
            font-family: "Yu Gothic UI", "Hiragino Sans", Meiryo, sans-serif;
        }

        html {
            -webkit-touch-callout: none;
        }
        
        body {
            margin: 0;
            min-height: 100%;
            background:
                radial-gradient(circle at top, rgba(255, 255, 255, 0.68), transparent 42%),
                linear-gradient(180deg, var(--bg) 0%, var(--bg-accent) 100%);
            padding: clamp(6px, 1.8vw, 18px);
            box-sizing: border-box;
            overscroll-behavior-y: none;
        }

        .app-shell {
            width: min(100%, 1320px);
            margin: 0 auto;
            padding: var(--shell-padding);
            border-radius: 32px;
            box-sizing: border-box;
        }

        [hidden] {
            display: none !important;
        }

        .screen[hidden] {
            display: none !important;
        }

        .lobby-screen {
            display: grid;
            gap: 18px;
        }

        .lobby-head {
            padding: 20px 22px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--line);
            background: rgba(255, 252, 246, 0.72);
            backdrop-filter: blur(12px);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.45);
            text-align: center;
        }

        .lobby-title {
            margin: 0;
            font-size: clamp(30px, 4.6vw, 48px);
            line-height: 0.98;
            letter-spacing: -0.04em;
        }

        .lobby-grid {
            display: flex;
            justify-content: center;
        }
        
        .lobby-grid .panel {
            width: 100%;
            max-width: 360px;
        }

        .lobby-help {
            margin-top: 14px;
            text-align: center;
        }

        .lobby-help-link {
            display: inline-block;
            font-size: 13px;
            color: var(--accent-strong);
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .lobby-help-link:hover {
            opacity: 0.8;
        }

        .game-screen {
            display: grid;
            gap: 14px;
        }

        .game-topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .panel,
        .card,
        .player-card {
            border: 1px solid var(--line);
            background: var(--panel);
            backdrop-filter: blur(10px);
        }

        .player-name,
        .section-title,
        .control-main {
            display: block;
            font-weight: 700;
            min-height: 1.5em; 
        }

        .player-meta,
        .card p,
        .game-kicker {
            color: var(--muted);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(0, 1.55fr) minmax(320px, 0.95fr);
            gap: 18px;
        }

        .panel {
            padding: 16px;
            border-radius: var(--radius-xl);
            min-width: 0;
        }

        .field {
            display: grid;
            gap: 6px;
        }

        .field label,
        .card h2 {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .field input {
            width: 100%;
            min-height: 46px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid rgba(74, 54, 34, 0.12);
            background: rgba(255, 255, 255, 0.85);
            color: var(--text);
            box-sizing: border-box;
        }

        .field input:focus {
            outline: 2px solid rgba(23, 89, 74, 0.25);
            border-color: rgba(23, 89, 74, 0.38);
        }

        .button-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .button {
            min-height: 48px;
            padding: 0 16px;
            border-radius: 14px;
            font-weight: 700;
            transition: transform 0.18s ease, opacity 0.18s ease, background 0.18s ease;
            cursor: pointer;
            border: none;
        }

        .button:hover {
            transform: translateY(-1px);
        }

        .button:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        .button-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            color: #f9fbf8;
        }

        .button-secondary {
            background: rgba(255, 255, 255, 0.9);
            color: var(--text);
            border: 1px solid rgba(74, 54, 34, 0.12);
        }

        .button-warn {
            background: rgba(164, 75, 31, 0.1);
            color: var(--warn);
            border: 1px solid rgba(164, 75, 31, 0.18);
        }

        .players {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            margin-bottom: 5px;
        }

        .player-card {
            padding: 8px 10px;
            border-radius: var(--radius-md);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
        }

        .player-card.active {
            border-color: rgba(23, 89, 74, 0.32);
            box-shadow: inset 0 0 0 1px rgba(23, 89, 74, 0.18);
            background: rgba(234, 247, 242, 0.92);
        }

        .player-card.black::before,
        .player-card.white::before {
            content: "";
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 10px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            border: 1px solid rgba(47, 36, 24, 0.25);
        }

        .player-card.black::before {
            background: #26211e;
        }

        .player-card.white::before {
            background: #f8f5ef;
        }

        .player-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding-left: 24px;
            width: 100%;
        }

        .seat-symbol {
            width: 30px;
            height: 30px;
            border-radius: 999px;
            border: 1px solid rgba(74, 54, 34, 0.16);
            background: rgba(255, 255, 255, 0.92);
            color: var(--text);
            font-size: 20px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }

        .seat-symbol:disabled {
            opacity: 0.32;
            cursor: not-allowed;
        }

        .player-main {
            display: flex;
            flex: 1;
            align-items: baseline;
            justify-content: space-between;
            gap: 8px;
            min-width: 0;
        }

        .player-name {
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .player-actions {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .player-timer {
            font-size: clamp(16px, 2.8vw, 22px);
            font-weight: 800;
            letter-spacing: -0.04em;
            font-variant-numeric: tabular-nums;
        }

        .player-ready {
            display: inline-flex;
            align-items: center;
        }

        .ready-mark {
            width: 28px;
            height: 28px;
            border-radius: 999px;
            border: 1px solid rgba(74, 54, 34, 0.16);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: rgba(47, 36, 24, 0.32);
            background: rgba(255, 255, 255, 0.72);
        }

        .ready-mark.passive {
            opacity: 0.72;
        }

        .ready-mark.active {
            color: #f8fbf8;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            border-color: rgba(23, 89, 74, 0.42);
        }

        .ready-button {
            width: 28px;
            height: 28px;
            padding: 0;
            border-radius: 999px;
            border: 1px solid rgba(74, 54, 34, 0.16);
            background: rgba(255, 255, 255, 0.92);
            color: rgba(47, 36, 24, 0.42);
            font-size: 14px;
            font-weight: 800;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            touch-action: manipulation;
            user-select: none;
        }

        .ready-button.active {
            color: #f8fbf8;
            background: linear-gradient(135deg, var(--accent), var(--accent-strong));
            border-color: rgba(23, 89, 74, 0.42);
        }

        /* 透過ダイアログのスタイル */
        .confirm-backdrop {
            position: fixed;
            inset: 0;
            display: grid;
            place-items: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.05);
            z-index: 30;
        }

        .confirm-card {
            width: auto;
            min-width: 240px;
            max-width: min(100%, 360px);
            padding: 16px;
            border-radius: 20px;
            border: 1px solid rgba(74, 54, 34, 0.1);
            background: rgba(255, 252, 246, 0.65);
            backdrop-filter: blur(2px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: grid;
            gap: 14px;
        }

        .confirm-actions {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        /* 盤面コンテナ（歪み防止の核） */
        .board-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .board-wrap {
            position: relative;
            border-radius: 26px;
            overflow: visible;
            padding: 0;
            box-sizing: border-box;
            background: transparent;
            box-shadow: none;
        }

        #boardCanvas {
            width: 100%;
            height: 100%;
            display: block;
            cursor: pointer;
            touch-action: none; /* ズーム等を防ぐ */
        }

        .board-controls {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr) auto;
            gap: 8px;
            width: 100%;
            box-sizing: border-box;
            align-items: center;
            margin-top: 5px;
            padding: 8px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius-lg);
            backdrop-filter: blur(10px);
        }

        .ctrl-left, .ctrl-center, .ctrl-right { display: flex; align-items: center; }
        .ctrl-left, .ctrl-right { gap: 6px; }
        .ctrl-center { gap: 6px; justify-content: center; min-width: 0; }
        .control-menu { position: relative; }
        
        .board-controls button {
            padding: 10px 12px;
            border: 1px solid rgba(74, 54, 34, 0.12);
            background: rgba(255, 255, 255, 0.85);
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            touch-action: manipulation;
            white-space: nowrap;
            user-select: none;
            color: var(--text);
            transition: transform 0.18s ease, background 0.18s ease;
        }
        .board-controls button:hover { background: rgba(255, 255, 255, 1); transform: translateY(-1px); }
        .board-controls button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
        
        .menu-icon-btn {
            width: 42px; height: 42px; padding: 0; display: inline-flex; align-items: center; justify-content: center;
        }
        .menu-icon-btn.active { background: rgba(23, 89, 74, 0.1); border-color: rgba(23, 89, 74, 0.38); color: var(--accent-strong); }
        .control-icon { display: inline-flex; width: 22px; height: 22px; }
        .control-icon svg { width: 100%; height: 100%; fill: currentColor; }
        .control-menu-popup {
            position: absolute; bottom: calc(100% + 8px); min-width: 144px; display: flex; flex-direction: column; gap: 0;
            padding: 5px; border: 1px solid var(--line); border-radius: 14px; background: rgba(255, 252, 246, 0.98);
            box-shadow: var(--shadow); z-index: 20;
        }
        .control-menu-popup[hidden] { display: none !important; }
        .control-menu.align-right .control-menu-popup { right: 0; }
        .control-menu:not(.align-right) .control-menu-popup { left: 0; }
        
        .board-controls .control-menu-item {
            width: 100%; text-align: left; padding: 12px 14px; font-size: 13px; font-weight: 600;
            color: var(--text); background: transparent; border: none; box-shadow: none; border-radius: 10px; outline: none;
            display: flex; align-items: center; justify-content: space-between; gap: 10px;
        }
        .board-controls .control-menu-item:hover { background: rgba(23, 89, 74, 0.08); transform: none; }
        .board-controls .control-menu-item::after { content: ''; width: 1em; flex: 0 0 1em; }
        .board-controls .control-menu-item.active::after { content: '✓'; color: var(--muted); }
        .board-controls .control-menu-item.board-theme-item::after,
        .board-controls .control-menu-item[data-value]::after { content: attr(data-value); width: auto; flex: 0 0 auto; color: var(--muted); }
        
        .nav-btn {
            padding: 0; display: inline-flex; align-items: center; justify-content: center;
            text-align: center; line-height: 1; height: 42px;
        }
        .nav-btn.branch { width: 3.5em; letter-spacing: -0.08em; }
        .nav-btn.step { width: 3.5em; }

        .sidebar {
            display: grid;
            gap: 14px;
            align-content: start;
            min-width: 0;
        }

        .card {
            padding: 16px;
            border-radius: var(--radius-xl);
        }

        .card h2 {
            margin: 0 0 12px;
            font-size: 15px;
        }

        .card p {
            margin: 0;
            line-height: 1.65;
            font-size: 14px;
        }

        .info-card {
            display: grid;
            gap: 12px;
        }

        .info-topline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .compact-time-editor {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .compact-time-editor input {
            width: 4.2em;
            min-height: 34px;
            padding: 6px 8px;
            border-radius: 10px;
            text-align: center;
            font-size: 13px;
        }

        .compact-time-editor span {
            color: var(--muted);
            font-size: 13px;
        }

        .spectator-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            align-content: start;
            gap: 8px;
            max-height: 88px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .spectator-item {
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.66);
            border: 1px solid rgba(74, 54, 34, 0.08);
            margin: 0;
            font-size: 14px;
            min-height: 40px;
            box-sizing: border-box;
        }

        .move-list,
        .log-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            align-content: start; /* ここで縦に伸びるのを防ぐ */
            gap: 10px;
            max-height: 260px;
            overflow: auto;
            padding-right: 4px;
        }

        .move-item,
        .log-item {
            padding: 10px 12px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.62);
            border: 1px solid rgba(74, 54, 34, 0.08);
        }

        .log-item {
            display: grid;
            gap: 4px;
        }

        .log-head {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            font-size: 12px;
        }

        .log-body {
            font-size: 14px;
            line-height: 1.55;
        }

        .log-compose {
            margin-top: 12px;
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 8px;
        }

        .log-compose input {
            min-width: 0;
            min-height: 40px;
            padding: 8px 10px;
            border-radius: 12px;
            border: 1px solid rgba(74, 54, 34, 0.12);
            background: rgba(255, 255, 255, 0.88);
            color: var(--text);
            font-size: 14px;
        }

        .log-author {
            font-weight: 700;
            color: var(--text);
        }

        .toast {
            position: fixed;
            right: 18px;
            bottom: 18px;
            min-width: 260px;
            max-width: min(420px, calc(100vw - 36px));
            padding: 14px 16px;
            border-radius: 16px;
            background: rgba(32, 26, 20, 0.9);
            color: #f8f5ef;
            box-shadow: 0 18px 36px rgba(24, 17, 12, 0.28);
            opacity: 0;
            transform: translateY(14px);
            pointer-events: none;
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 20;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .mono {
            font-family: Consolas, "Courier New", monospace;
            letter-spacing: 0.02em;
        }

        /* PC画面幅 (1081px以上) のレイアウト: スクロールさせず1画面に収める */
        @media (min-width: 1081px) {
            html, body {
                height: 100%;
                overflow: hidden;
            }
            body {
                padding: 4px;
            }
            .app-shell {
                height: 100%;
                display: flex;
                flex-direction: column;
                padding: 8px;
            }
            .game-screen {
                flex: 1;
                min-height: 0;
                display: grid;
                grid-template-rows: minmax(0, 1fr);
            }
            .layout {
                min-height: 0;
                align-items: center;
                gap: 12px;
                height: 100%;
            }
            .panel {
                padding: 12px;
            }
            .layout > .panel:first-child {
                display: flex;
                flex-direction: column;
                min-height: 0;
                height: min(100%, 820px);
                max-height: calc(100vh - 24px);
                justify-content: center;
                gap: 8px;
            }
            .players, .board-controls {
                flex: 0 0 auto;
            }
            .board-container {
                flex: 0 1 auto;
                min-height: 0;
                height: min(calc(100vh - 150px), 680px);
                max-height: 680px;
                aspect-ratio: 1 / 1;
            }
            .sidebar .card h2 {
                display: none !important;
            }
            .sidebar {
                display: flex;
                flex-direction: column;
                min-height: 0;
                max-height: min(calc(100vh - 24px), 760px);
                overflow-y: auto; 
            }
            .sidebar > .card:nth-child(1) {
                flex: 0 1 420px;
                display: flex;
                flex-direction: column;
                min-height: 0;
                max-height: 420px;
            }
            .sidebar > .card:nth-child(1) .log-list {
                flex: 1 1 auto;
                max-height: none;
                overflow-y: auto;
            }
        }

        /* スマホ・タブレット縦など (1080px以下) */
        @media (min-width: 1081px) and (max-width: 1280px) and (orientation: landscape) {
            .layout > .panel:first-child {
                gap: 6px;
            }
            .players {
                gap: 6px;
                margin-bottom: 0;
            }
            .player-card {
                padding: 4px 8px;
            }
            .player-head {
                gap: 6px;
                padding-left: 18px;
            }
            .player-card.black::before,
            .player-card.white::before {
                left: 7px;
                width: 7px;
                height: 7px;
            }
            .player-name {
                font-size: 11px;
                min-height: 1.1em;
            }
            .player-main,
            .player-actions {
                gap: 5px;
            }
            .player-timer {
                font-size: 15px;
            }
            .seat-symbol,
            .ready-mark,
            .ready-button {
                width: 22px;
                height: 22px;
                font-size: 12px;
            }
            .board-container {
                height: min(calc(100vh - 108px), 660px);
                max-height: 660px;
            }
        }

        @media (max-width: 1080px) {
            .layout {
                grid-template-columns: 1fr;
            }
            .sidebar .card h2 {
                display: none !important;
            }
            .board-container {
                aspect-ratio: 1 / 1;
            }
        }

        /* スマホ向けレイアウト */
        @media (min-width: 721px) and (max-width: 1080px) {
            .players,
            .board-controls {
                width: min(100%, 680px);
                max-width: 680px;
                margin-left: auto;
                margin-right: auto;
            }
            .board-container {
                width: min(100%, 680px);
                max-width: 680px;
                margin: 0 auto;
            }
        }

        @media (min-width: 721px) and (max-width: 1080px) and (orientation: landscape) {
            .players {
                gap: 6px;
                margin-bottom: 0;
            }
            .player-card {
                padding: 4px 8px;
            }
            .player-head {
                gap: 6px;
                padding-left: 18px;
            }
            .player-card.black::before,
            .player-card.white::before {
                left: 7px;
                width: 7px;
                height: 7px;
            }
            .player-name {
                font-size: 11px;
                min-height: 1.1em;
            }
            .player-main,
            .player-actions {
                gap: 5px;
            }
            .player-timer {
                font-size: 15px;
            }
            .seat-symbol,
            .ready-mark,
            .ready-button {
                width: 22px;
                height: 22px;
                font-size: 12px;
            }
        }

        @media (max-width: 720px) {
            body { padding: 0; }
            .app-shell {
                width: 100%;
                margin: 0 auto;
                padding: 6px;
                border-radius: 0;
            }

            .game-screen .layout > .panel:first-child {
                background: transparent;
                border: none;
                padding: 0;
                border-radius: 0;
                box-shadow: none;
            }

            .panel,
            .card {
                padding: 12px;
                border-radius: 18px;
            }

            .players {
                grid-template-columns: 1fr;
                margin-bottom: 8px;
                padding: 0 4px;
            }

            .layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                grid-template-columns: 1fr;
                padding: 0 4px;
            }

            .info-topline {

        const STONE_SOUND_SRC = './mp3/play1.mp3';
        const STONE_SOUND_POOL_SIZE = 4;
        const STONE_SOUND_POOL_MAX = 8;
        let stoneSoundBuffer = null;
        let stoneSoundBufferPromise = null;
        let stoneSoundPool = [];
        let lastReportedSec = null;

        function initAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) {
                    audioCtx = new AudioContext();
                }
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function initStoneSound() {
            if (stoneSoundPool.length || !window.Audio) return;
            stoneSoundPool = Array.from({ length: STONE_SOUND_POOL_SIZE }, () => {
                return createStoneAudioElement();
            });
        }

        function createStoneAudioElement() {
            const sound = new Audio(STONE_SOUND_SRC);
            sound.preload = 'none';
            return sound;
        }

        function decodeAudioDataCompat(arrayBuffer) {
            return new Promise((resolve, reject) => {
                const decoded = audioCtx.decodeAudioData(arrayBuffer, resolve, reject);
                if (decoded && typeof decoded.then === 'function') {
                    decoded.then(resolve, reject);
                }
            });
        }

        function ensureStoneSoundBuffer() {
            if (!audioCtx || stoneSoundBuffer || stoneSoundBufferPromise) return;
            stoneSoundBufferPromise = fetch(STONE_SOUND_SRC)
                .then((response) => {
                    if (!response.ok) throw new Error(`stone sound load failed: ${response.status}`);
                    return response.arrayBuffer();
                })
                .then(decodeAudioDataCompat)
                .then((buffer) => {
                    stoneSoundBuffer = buffer;
                    return buffer;
                })
                .catch(() => {
                    stoneSoundBufferPromise = null;
                    return null;
                });
        }

        document.body.addEventListener('pointerdown', () => {
            if (soundEnabled) initAudio();
        }, { once: true, capture: true });

        function playStoneSoundBuffer() {
            if (!audioCtx || !stoneSoundBuffer || audioCtx.state !== 'running') return false;
            const source = audioCtx.createBufferSource();
            const gain = audioCtx.createGain();
            source.buffer = stoneSoundBuffer;
            gain.gain.value = 1;
            source.connect(gain);
            gain.connect(audioCtx.destination);
            source.start();
            return true;
        }

        function playStoneSoundFallback() {
            initStoneSound();
            if (!stoneSoundPool.length) return;
            let sound = stoneSoundPool.find((item) => item.paused || item.ended);
            if (!sound && stoneSoundPool.length < STONE_SOUND_POOL_MAX) {
                sound = createStoneAudioElement();
                stoneSoundPool.push(sound);
            }
            if (!sound) return;
            try {
                sound.currentTime = 0;
            } catch (error) {
                // iOS may reject currentTime before metadata is available; play from the start anyway.
            }
            sound.play().catch(() => {});
        }

        function playStoneSound(isSelf) {
            if (!soundEnabled) return;
            initAudio();
            ensureStoneSoundBuffer();
            if (playStoneSoundBuffer()) return;
            playStoneSoundFallback();
        }

        function playCountdownSound() {
            if (!soundEnabled) return;
            initAudio();
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

            if (typeof val === 'function') return val(arg);

        function setScreen(name) {
            elements.lobbyScreen.hidden = name !== 'lobby';
            elements.gameScreen.hidden = name !== 'game';
            requestAnimationFrame(() => {
                if (name === 'game') resizeBoard();
            });
        }

        function sanitizeName(value) {
            const fallback = 'Player';
            const trimmed = String(value || '').trim().replace(/\s+/g, ' ');
            return (trimmed || fallback).slice(0, 24);
        }

        function createToken() {
            if (window.crypto && typeof window.crypto.randomUUID === 'function') {
                return window.crypto.randomUUID();
            }
            return `${Date.now()}-${Math.random().toString(36).slice(2, 12)}`;
        }

        function getLocalPlayerToken(roomCode) {
            const storageKey = `${PLAYER_TOKEN_PREFIX}${roomCode}`;
            try {
                const existing = window.localStorage.getItem(storageKey);
                if (existing) return existing;
                const nextToken = createToken();
                window.localStorage.setItem(storageKey, nextToken);
                return nextToken;
            } catch (error) {
                return createToken();
            }
        }

        function getRoomStateStorageKey(nextRoomId) {
            return `${ROOM_STATE_PREFIX}${nextRoomId}`;
        }

        function persistRoomStateSnapshot() {
            if (!state || !state.roomId) return;
            try {
                window.localStorage.setItem(getRoomStateStorageKey(state.roomId), JSON.stringify({
                    savedAt: Date.now(),
                    state,
                }));
            } catch (error) {
                // Best-effort recovery cache.
            }
        }

        function clearRoomStateSnapshot(nextRoomId) {
            if (!nextRoomId) return;
            try {
                window.localStorage.removeItem(getRoomStateStorageKey(nextRoomId));
            } catch (error) {
                // Best-effort cleanup.
            }
        }

        function loadRoomStateSnapshot(nextRoomId, localName) {
            if (!nextRoomId || !localName) return null;
            try {
                const raw = window.localStorage.getItem(getRoomStateStorageKey(nextRoomId));
                if (!raw) return null;
                const parsed = JSON.parse(raw);
                if (!parsed || parsed.state?.roomId !== nextRoomId) return null;
                if (Date.now() - Number(parsed.savedAt || 0) > ROOM_STATE_MAX_AGE_MS) {
                    clearRoomStateSnapshot(nextRoomId);
                    return null;
                }
                const participants = Object.values(parsed.state.participantsById || {});
                if (!participants.some((participant) => participant?.name === localName)) return null;
                return parsed.state;
            } catch (error) {
                return null;
            }
        }

        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }

        function nowIsoTime() {
            return new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function showToast(message) {
            elements.toast.textContent = message;
            elements.toast.classList.add('show');
            window.clearTimeout(toastTimer);
            toastTimer = window.setTimeout(() => {
                elements.toast.classList.remove('show');
            }, 2600);
        }

        function buildSettings() {
            return {
                baseSeconds: 5 * 60,
                incrementSeconds: 5,
                opening: 'taraguchi10',
            };
        }

        function createInitialState(nextRoomId, hostId, hostName, settings, hostToken = '') {
            const initialMs = settings.baseSeconds * 1000;
            return {
                roomId: nextRoomId,
                config: settings,
                hostPeerId: hostId,
                joinOrder: [hostId],
                participantsById: {
                    [hostId]: { id: hostId, name: hostName, seat: 'black', isHost: true, token: hostToken },
                },
                seats: {
                    black: hostId,
                    white: null,
                },
                readyByPeerId: {
                    [hostId]: false,
                },
                colorsByPeerId: { [hostId]: 'black' },
                moves: [],
                phase: 'waiting-guest',
                opening: {
                    variant: null,
                    offeredMoves: [],
                },
                clocks: {
                    remainingMsByPeerId: { [hostId]: initialMs },
                    activePeerId: null,
                    activeStartedAt: null,
                },
                status: 'waiting',
                winnerId: null,
                resultText: '',
                drawOfferByPeerId: '',
                takebackOfferByPeerId: '',
                connectionPause: null,
                reviewMoves: [],
                reviewCursor: 0,
                log: [createLogEntry('presence', i18n('msgJoined', hostName))],
                version: 0,
            };
        }

        function createLogEntry(kind, text) {
            return {
                id: `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
                kind,
                text,
                time: nowIsoTime(),
            };
        }

        function addLog(kind, text) {
            if (!state) return null;
            const entry = createLogEntry(kind, text);
            if (!Array.isArray(state.log)) state.log = [];
            state.log.unshift(entry);
            state.log = state.log.slice(0, MAX_LOG_ITEMS);
            return entry;
        }

        function addLogEntry(entry) {
            if (!state || !entry) return;
            if (!Array.isArray(state.log)) state.log = [];
            if (state.log.some((item) => item.id === entry.id)) return;
            state.log.unshift(entry);
            state.log = state.log.slice(0, MAX_LOG_ITEMS);
        }

        function normalizeCommentText(value) {
            return String(value || '').replace(/\s+/g, ' ').trim().slice(0, 140);
        }

        function getRenderedMoves() {
            if (state?.status === 'finished') {
                return (state.reviewMoves || []).slice(0, state.reviewCursor ?? (state.reviewMoves?.length || 0));
            }
            return state?.moves || [];
        }

        function createRequestId() {
            return `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
        }

        function clearPendingMove() {
            pendingMove = null;
        }

        function setPendingMove(action) {
            if (!state || !localPeerId || action.kind !== 'move') return;
            pendingMove = {
                x: action.x,
                y: action.y,
                color: getColorForPeer(localPeerId),
                peerId: localPeerId,
                number: (state.moves || []).length + 1,
                requestId: action.requestId,
            };
            renderBoard();
        }

        function clearLocalOptimisticRequests() {
            if (!state || !localPeerId) return;
            if (state.drawOfferByPeerId === localPeerId) state.drawOfferByPeerId = '';
            if (state.takebackOfferByPeerId === localPeerId) state.takebackOfferByPeerId = '';
        }

        function applyOptimisticRequest(kind) {
            if (!state || !localPeerId) return true;
            if (kind === 'draw') {
                const error = getDrawRequestError(localPeerId);
                if (error) {
                    showToast(error);
                    return false;
                }
                if (!state.drawOfferByPeerId) {
                    state.drawOfferByPeerId = localPeerId;
                    showToast(i18n('msgDrawOffered'));
                    render();
                }
            }
            if (kind === 'takeback') {
                const error = getTakebackRequestError(localPeerId);
                if (error) {
                    showToast(error);
                    return false;
                }
                state.takebackOfferByPeerId = localPeerId;
                showToast(i18n('msgTakebackRequested'));
                render();
            }
            return true;
        }

        function canUseReviewBoard() {
            return Boolean(state && state.status === 'finished');
        }

        function resetReviewMoves() {
            if (!state) return;
            state.reviewMoves = state.status === 'finished'
                ? (state.moves || []).map((move) => ({ ...move }))
                : [];
            state.reviewCursor = state.reviewMoves.length;
        }

        function resetReviewMovesForPeer(peerId) {
            if (!canUseReviewBoard()) return i18n('errReviewOnlyAfter');
            state.reviewMoves = (state.moves || []).map(m => ({...m}));
            state.reviewCursor = state.reviewMoves.length;
            return '';
        }

        function addReviewMove(peerId, x, y) {
            if (!canUseReviewBoard()) return i18n('errReviewOnlyAfter');
            if (!getParticipantById(peerId)) return i18n('errReviewOnlyParticipant');
            
            const cursor = state.reviewCursor ?? (state.reviewMoves || []).length;
            const currentMoves = (state.reviewMoves || []).slice(0, cursor);
            
            if (currentMoves.some((move) => move.x === x && move.y === y)) {
                return i18n('errReviewOccupied');
            }

            state.reviewMoves = currentMoves;
            const nextColor = state.reviewMoves.length % 2 === 0 ? 'black' : 'white';
            state.reviewMoves.push({
                x,
                y,
                color: nextColor,
                peerId,
                number: state.reviewMoves.length + 1,
                review: true,
            });
            state.reviewCursor = state.reviewMoves.length;
            return '';
        }
        
        function setReviewCursor(peerId, cursor) {
            if (!canUseReviewBoard()) return i18n('errReviewOnlyAfter');
            if (!getParticipantById(peerId)) return i18n('errReviewOnlyParticipant');
            const max = (state.reviewMoves || []).length;
            state.reviewCursor = Math.max(0, Math.min(max, cursor));
            return '';
        }

        function getParticipantById(peerId) {
            if (!state || !peerId) return null;
            return state.participantsById?.[peerId] || null;
        }

        function isHostParticipant(participant) {
            return Boolean(state && participant && participant.id === state.hostPeerId);
        }

        function getDisplayName(participant) {
            if (!participant) return i18n('playerNotJoined');
            return isHostParticipant(participant) ? `${participant.name}*` : participant.name;
        }

        function setHostPeerId(nextHostPeerId) {
            if (!state) return;
            state.hostPeerId = nextHostPeerId || '';
            Object.values(state.participantsById || {}).forEach((participant) => {
                if (!participant) return;
                participant.isHost = Boolean(nextHostPeerId) && participant.id === nextHostPeerId;
            });
        }

        function ensureJoinOrderContains(peerId) {
            if (!state || !peerId) return;
            if (!Array.isArray(state.joinOrder)) state.joinOrder = [];
            if (!state.joinOrder.includes(peerId)) state.joinOrder.push(peerId);
        }

        function removeFromJoinOrder(peerId) {
            if (!state || !Array.isArray(state.joinOrder)) return;
            state.joinOrder = state.joinOrder.filter((id) => id !== peerId);
        }

        function getNextHostCandidatePeerId(fromPeerId) {
            if (!state) return '';
            const order = Array.isArray(state.joinOrder) && state.joinOrder.length
                ? state.joinOrder.slice()
                : Object.keys(state.participantsById || {});
            if (!order.length) return '';
            const hostIndex = order.indexOf(fromPeerId);
            const startIndex = hostIndex >= 0 ? hostIndex : -1;
            for (let step = 1; step <= order.length; step += 1) {
                const idx = (startIndex + step + order.length) % order.length;
                const candidateId = order[idx];
                if (!candidateId || candidateId === fromPeerId) continue;
                const participant = getParticipantById(candidateId);
                if (!participant) continue;
                if (isParticipantDisconnected(participant)) continue;
                return candidateId;
            }
            return '';
        }

        function isParticipantDisconnected(participant) {
            return Boolean(participant && participant.disconnectedAt);
        }

        function getDisconnectedRemainingSeconds(participant) {
            if (!isParticipantDisconnected(participant)) return 0;
            const remaining = Math.max(0, (participant.disconnectedUntil || 0) - Date.now());
            return Math.ceil(remaining / 1000);
        }

        function hasDisconnectedSeatedPlayer() {
            if (!state) return false;
            return [state.seats.black, state.seats.white].some((peerId) => {
                const participant = getParticipantById(peerId);
                return isParticipantDisconnected(participant);
            });
        }

        function getDisconnectedSeatedParticipantByName(name) {
            if (!state || !name) return null;
            return Object.values(state.participantsById || {}).find((participant) => {
                return participant
                    && participant.name === name
                    && participant.disconnectedAt
                    && (participant.seat === 'black' || participant.seat === 'white');
            }) || null;
        }

        function replacePeerIdReferences(oldPeerId, nextPeerId) {
            if (!state || !oldPeerId || !nextPeerId || oldPeerId === nextPeerId) return;

            const participant = state.participantsById[oldPeerId];
            if (participant) {
                delete state.participantsById[oldPeerId];
                participant.id = nextPeerId;
                state.participantsById[nextPeerId] = participant;
            }

            if (state.hostPeerId === oldPeerId) state.hostPeerId = nextPeerId;
            if (state.seats.black === oldPeerId) state.seats.black = nextPeerId;
            if (state.seats.white === oldPeerId) state.seats.white = nextPeerId;
            if (state.clocks.activePeerId === oldPeerId) state.clocks.activePeerId = nextPeerId;
            if (state.drawOfferByPeerId === oldPeerId) state.drawOfferByPeerId = nextPeerId;
            if (state.takebackOfferByPeerId === oldPeerId) state.takebackOfferByPeerId = nextPeerId;
            if (state.connectionPause?.peerId === oldPeerId) state.connectionPause.peerId = nextPeerId;
            if (state.connectionPause?.activePeerId === oldPeerId) state.connectionPause.activePeerId = nextPeerId;

            for (const collectionName of ['colorsByPeerId', 'readyByPeerId']) {
                const collection = state[collectionName];
                if (collection && Object.prototype.hasOwnProperty.call(collection, oldPeerId)) {
                    collection[nextPeerId] = collection[oldPeerId];
                    delete collection[oldPeerId];
                }
            }

            if (state.clocks.remainingMsByPeerId && Object.prototype.hasOwnProperty.call(state.clocks.remainingMsByPeerId, oldPeerId)) {
                state.clocks.remainingMsByPeerId[nextPeerId] = state.clocks.remainingMsByPeerId[oldPeerId];
                delete state.clocks.remainingMsByPeerId[oldPeerId];
            }

            for (const move of state.moves || []) {
                if (move.peerId === oldPeerId) move.peerId = nextPeerId;
            }
            for (const move of state.reviewMoves || []) {
                if (move.peerId === oldPeerId) move.peerId = nextPeerId;
            }
            if (Array.isArray(state.joinOrder)) {
                state.joinOrder = state.joinOrder.map((peerId) => (peerId === oldPeerId ? nextPeerId : peerId));
            }
        }

        function restoreLocalHostFromSnapshot(nextRoomId, nextHostId, nextHostName, settings, hostToken) {
            const restored = loadRoomStateSnapshot(nextRoomId, nextHostName);
            if (!restored) {
                return createInitialState(nextRoomId, nextHostId, nextHostName, settings, hostToken);
            }

            state = restored;
            const localParticipant = Object.values(state.participantsById || {})
                .find((participant) => participant?.name === nextHostName);

            if (localParticipant && localParticipant.id !== nextHostId) {
                replacePeerIdReferences(localParticipant.id, nextHostId);
            }

            if (!state.participantsById[nextHostId]) {
                state.participantsById[nextHostId] = { id: nextHostId, name: nextHostName, seat: 'spectator', isHost: true, token: hostToken };
                ensureJoinOrderContains(nextHostId);
            }

            const participant = state.participantsById[nextHostId];
            participant.name = nextHostName;
            participant.token = hostToken || participant.token;
            delete participant.disconnectedAt;
            delete participant.disconnectedUntil;

            state.config = state.config || settings;
            setHostPeerId(nextHostId);
            ensureClockEntry(nextHostId);
            rebuildColors();
            resumeMatchAfterReconnect();
            persistRoomStateSnapshot();
            return state;
        }

        function getPeerName(peerId) {
            const participant = getParticipantById(peerId);
            return participant ? participant.name : i18n('playerNotJoined');
        }

        function getBlackPeerId() {
            return state?.seats?.black || '';
        }

        function getWhitePeerId() {
            return state?.seats?.white || '';
        }

        function getColorForPeer(peerId) {
            return state?.colorsByPeerId?.[peerId] || '';
        }

        function getOpponentPeerId(peerId) {
            if (!state || !peerId) return '';
            const ids = [state.seats.black, state.seats.white].filter(Boolean);
            return ids.find((id) => id !== peerId) || '';
        }

        function bothPlayersReady() {
            return Boolean(state?.seats?.black && state?.seats?.white && state.seats.black !== state.seats.white);
        }

        function seatedPlayersMarkedReady() {
            if (!bothPlayersReady()) return false;
            return Boolean(state.readyByPeerId?.[state.seats.black] && state.readyByPeerId?.[state.seats.white]);
        }

        function resetReadyFlags() {
            if (!state) return;
            if (state.seats.black) state.readyByPeerId[state.seats.black] = false;
            if (state.seats.white) state.readyByPeerId[state.seats.white] = false;
        }

        function clearBoardForNewMatch() {
            if (!state) return;
            state.moves = [];
            state.reviewMoves = [];
            state.reviewCursor = 0;
            state.opening = {
                variant: null,
                offeredMoves: [],
            };
            state.winnerId = null;
            state.resultText = '';
            state.drawOfferByPeerId = '';
            state.takebackOfferByPeerId = '';
            state.connectionPause = null;
            state.clocks.remainingMsByPeerId = {};
            Object.values(state.participantsById || {}).forEach((participant) => {
                state.clocks.remainingMsByPeerId[participant.id] = state.config.baseSeconds * 1000;
            });
            stopClock();
        }

        function rebuildColors() {
            if (!state) return;
            state.colorsByPeerId = {};
            if (state.seats.black) state.colorsByPeerId[state.seats.black] = 'black';
            if (state.seats.white) state.colorsByPeerId[state.seats.white] = 'white';
        }

        function ensureClockEntry(peerId) {
            if (!state || !peerId) return;
            if (state.clocks.remainingMsByPeerId[peerId] == null) {
                state.clocks.remainingMsByPeerId[peerId] = state.config.baseSeconds * 1000;
            }
            if (state.readyByPeerId[peerId] == null) {
                state.readyByPeerId[peerId] = false;
            }
        }

        function canSelfChangeSeat(peerId, nextSeat) {
            if (!state || !peerId) return false;
            const participant = getParticipantById(peerId);
            if (!participant) return false;
            if (nextSeat === 'spectator') return true;
            if (nextSeat !== 'black' && nextSeat !== 'white') return false;
            const occupant = state.seats[nextSeat];
            return !occupant || occupant === peerId;
        }

        function assignSeat(targetPeerId, nextSeat, options = {}) {
            if (!state) return i18n('errUnconnected');
            const participant = getParticipantById(targetPeerId);
            if (!participant) return '';
            if (!['black', 'white', 'spectator'].includes(nextSeat)) return i18n('errInvalidSeat');

            const currentSeat = participant.seat || 'spectator';
            if (currentSeat === nextSeat) return '';

            const beforeSeatedIds = [state.seats.black, state.seats.white].filter(Boolean);
            if (currentSeat === 'black') state.seats.black = null;
            if (currentSeat === 'white') state.seats.white = null;
            state.readyByPeerId[targetPeerId] = false;

            if (nextSeat === 'black' || nextSeat === 'white') {
                const displacedPeerId = state.seats[nextSeat];
                if (displacedPeerId && displacedPeerId !== targetPeerId && state.participantsById[displacedPeerId]) {
                    state.participantsById[displacedPeerId].seat = 'spectator';
                    state.readyByPeerId[displacedPeerId] = false;
                }
                state.seats[nextSeat] = targetPeerId;
            }

            participant.seat = nextSeat;
            rebuildColors();
            ensureClockEntry(targetPeerId);

            if (
                state.status === 'playing'
                && nextSeat === 'spectator'
                && (currentSeat === 'black' || currentSeat === 'white')
            ) {
                finishGame('', '', i18n('msgAgreedEndLog'));
                return '';
            }

            if (!bothPlayersReady()) {
                state.phase = 'waiting-guest';
                state.status = 'waiting';
                stopClock();
                return '';
            }

            const afterSeatedIds = [state.seats.black, state.seats.white].filter(Boolean);
            const seatingChanged = beforeSeatedIds.join(':') !== afterSeatedIds.join(':');
            if (seatingChanged) {
                resetReadyFlags();
                state.phase = 'waiting-guest';
                state.status = 'waiting';
                stopClock();
            }
            return '';
        }

        function pauseMatchForDisconnect(peerId) {
            if (!state || state.status !== 'playing') return;
            const activePeerId = state.clocks.activePeerId;
            applyElapsedTime();
            state.connectionPause = { peerId, activePeerId };
            stopClock();
        }

        function resumeMatchAfterReconnect() {
            if (!state || state.status !== 'playing' || !state.connectionPause) return;
            if (hasDisconnectedSeatedPlayer()) return;
            const activePeerId = state.connectionPause.activePeerId || phaseDescriptor().actorPeerId;
            state.connectionPause = null;
            if (activePeerId) {
                startClockFor(activePeerId);
            }
        }

        function preserveDisconnectedParticipant(peerId) {
            if (!state || !peerId) return false;
            const participant = getParticipantById(peerId);
            if (!participant) return false;
            const wasSeated = participant.seat === 'black' || participant.seat === 'white';
            if (!wasSeated || state.status !== 'playing' || state.moves.length === 0) return false;
            if (participant.disconnectedAt) return true;

            participant.disconnectedAt = Date.now();
            participant.disconnectedUntil = participant.disconnectedAt + DISCONNECT_GRACE_MS;
            pauseMatchForDisconnect(peerId);
            addLog('presence', i18n('msgDisconnected', participant.name));
            return true;
        }

        function reconnectDisconnectedParticipant(oldPeerId, nextPeerId, nextName, token) {
            const previousParticipant = getParticipantById(oldPeerId);
            const wasSeated = Boolean(previousParticipant && (previousParticipant.seat === 'black' || previousParticipant.seat === 'white'));
            const wasMarkedDisconnected = Boolean(previousParticipant && previousParticipant.disconnectedAt);
            const oldConnection = guestConnections.get(oldPeerId);
            if (oldConnection) {
                if (wasSeated && !wasMarkedDisconnected) {
                    addLog('presence', i18n('msgDisconnected', previousParticipant.name));
                }
                suppressedConnectionClosePeers.add(oldPeerId);
                if (guestConnections.get(oldPeerId) === oldConnection) {
                    guestConnections.delete(oldPeerId);
                }
                try { oldConnection.close(); } catch (error) { }
            }
            replacePeerIdReferences(oldPeerId, nextPeerId);
            const participant = getParticipantById(nextPeerId);
            if (!participant) return null;
            participant.name = nextName || participant.name;
            participant.token = token || participant.token;
            delete participant.disconnectedAt;
            delete participant.disconnectedUntil;
            ensureClockEntry(nextPeerId);
            rebuildColors();
            resumeMatchAfterReconnect();
            addLog('presence', i18n('msgReconnected', participant.name));
            return participant;
        }

        function removeParticipant(peerId, reasonText = '') {
            if (!state || !peerId) return;
            const participant = getParticipantById(peerId);
            if (!participant) return;
            const wasSeated = participant.seat === 'black' || participant.seat === 'white';
            if (participant.seat === 'black') state.seats.black = null;
            if (participant.seat === 'white') state.seats.white = null;
            delete state.participantsById[peerId];
            delete state.colorsByPeerId[peerId];
            delete state.clocks.remainingMsByPeerId[peerId];
            delete state.readyByPeerId[peerId];
            removeFromJoinOrder(peerId);
            
            if (reasonText) addLog('system', reasonText);
            
            if (!bothPlayersReady()) {
                state.phase = 'waiting-guest';
                state.status = 'waiting';
                stopClock();
            }
        }

        function clearHostReconnectTimer() {
            if (!hostReconnectTimer) return;
            window.clearTimeout(hostReconnectTimer);
            hostReconnectTimer = 0;
        }

        function attemptGuestReconnectToHost() {
            if (localMode !== 'guest' || !roomId) return;
            if (hostConnection && hostConnection.open) return;
            if (!peer || peer.disconnected || peer.destroyed) {
                if (peer) {
                    try { peer.destroy(); } catch (error) { }
                }
                peer = new Peer(undefined, { roomId });
                peer.on('open', (id) => {
                    if (localMode !== 'guest') return;
                    localPeerId = id;
                    attemptGuestReconnectToHost();
                });
                peer.on('error', () => {
                    if (localMode === 'guest') scheduleGuestReconnect(1200);
                });
                attachLocalPeerClose(peer);
                return;
            }
            try {
                hostConnection = peer.connect(roomId, {
                    reliable: true,
                    metadata: {
                        name: sanitizeName(elements.nameInput.value || 'Player'),
                        token: localPlayerToken,
                    },
                });
                wireConnectionHandlers(hostConnection);
            } catch (error) {
                scheduleGuestReconnect();
            }
        }

        function becomeGuestAndReconnect(delayMs = 650) {
            if (peer) {
                suppressLocalPeerClose = true;
                try { peer.destroy(); } catch (error) { }
                peer = null;
                window.setTimeout(() => { suppressLocalPeerClose = false; }, 0);
            }
            localMode = 'guest';
            localPeerId = '';
            hostConnection = null;
            setConnectionLabel(i18n('msgRoomSyncing'));
            scheduleGuestReconnect(delayMs);
            render();
        }

        function attemptHostReconnect() {
            if (!state || !roomId) return;
            if (peer) {
                suppressLocalPeerClose = true;
                try { peer.destroy(); } catch (error) { }
                peer = null;
                window.setTimeout(() => { suppressLocalPeerClose = false; }, 0);
            }
            peer = new Peer(roomId);
            peer.on('open', (id) => {
                if (!state) return;
                localMode = 'host';
                localPeerId = id;
                setHostPeerId(id);
                const participant = getParticipantById(id);
                if (participant) {
                    delete participant.disconnectedAt;
                    delete participant.disconnectedUntil;
                }
                setConnectionLabel(i18n('msgRoomCreated'));
                elements.leaveRoomBtn.disabled = false;
                broadcastState();
                render();
            });
            peer.on('connection', (incoming) => {
                if (localMode !== 'host') return;
                if (!state) {
                    incoming.on('open', () => incoming.send({ type: 'reject', message: 'Not initialized.' }));
                    incoming.on('open', () => incoming.close());
                    return;
                }
                const previousConnection = guestConnections.get(incoming.peer);
                if (previousConnection && previousConnection !== incoming) {
                    try { previousConnection.close(); } catch (error) { }
                }
                guestConnections.set(incoming.peer, incoming);
                wireConnectionHandlers(incoming);
            });
            attachLocalPeerClose(peer);
            peer.on('error', (error) => {
                if (error.type === 'unavailable-id') {
                    becomeGuestAndReconnect(650);
                    return;
                }
                if (error.type === 'network') {
                    showToast(i18n('errCommError'));
                    window.setTimeout(() => {
                        if (localMode === 'host') attemptHostReconnect();
                    }, 1200);
                    return;
                }
                showToast(`Error: ${error.type || error.message}`);
            });
        }

        function handleLocalPeerClose() {
            if (suppressLocalPeerClose) return;
            if (localMode === 'host' && state) {
                persistRoomStateSnapshot();
                hostConnection = null;
                stopClock();
                setConnectionLabel(i18n('msgRoomSyncing'));
                window.setTimeout(() => {
                    if (localMode === 'host') attemptHostReconnect();
                }, 650);
                render();
                return;
            }
            if (localMode === 'guest') {
                hostConnection = null;
                scheduleGuestReconnect(1200);
            }
        }

        function attachLocalPeerClose(peerInstance) {
            if (!peerInstance) return;
            peerInstance.on('close', () => {
                if (peer !== peerInstance) return;
                handleLocalPeerClose();
            });
        }

        function scheduleGuestReconnect(delayMs = 650) {
            clearHostReconnectTimer();
            hostReconnectTimer = window.setTimeout(() => {
                hostReconnectTimer = 0;
                attemptGuestReconnectToHost();
            }, delayMs);
        }

        function beginHostTakeover(previousHostId) {
            if (!state || hostTakeoverInProgress) return;
            hostTakeoverInProgress = true;
            clearHostReconnectTimer();
            const localCandidateId = localPeerId;
            const previousHost = getParticipantById(previousHostId);

            if (previousHost) {
                const placeholderId = `host-disconnected-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
                replacePeerIdReferences(previousHostId, placeholderId);
                const placeholder = getParticipantById(placeholderId);
                if (placeholder) {
                    placeholder.isHost = false;
                    if (!placeholder.disconnectedAt) {
                        placeholder.disconnectedAt = Date.now();
                        placeholder.disconnectedUntil = placeholder.disconnectedAt + DISCONNECT_GRACE_MS;
                    }
                }
            }

            replacePeerIdReferences(localCandidateId, roomId);
            setHostPeerId(roomId);
            const localParticipant = getParticipantById(roomId);
            if (localParticipant) {
                localParticipant.name = sanitizeName(elements.nameInput.value || localParticipant.name || 'Player');
                localParticipant.token = localPlayerToken || localParticipant.token;
                delete localParticipant.disconnectedAt;
                delete localParticipant.disconnectedUntil;
            }

            localMode = 'host';
            localPeerId = roomId;

            if (hostConnection) {
                try { hostConnection.close(); } catch (error) { }
                hostConnection = null;
            }
            if (peer) {
                suppressLocalPeerClose = true;
                try { peer.destroy(); } catch (error) { }
                peer = null;
                window.setTimeout(() => { suppressLocalPeerClose = false; }, 0);
            }
            const startHostTakeoverPeer = () => {
                if (localMode !== 'host') return;
                peer = new Peer(roomId);
                peer.on('open', (id) => {
                    localMode = 'host';
                    localPeerId = id;
                    setConnectionLabel(i18n('msgRoomCreated'));
                    elements.leaveRoomBtn.disabled = false;
                    hostTakeoverInProgress = false;
                    broadcastState();
                    render();
                });
                attachLocalPeerClose(peer);
                peer.on('connection', (incoming) => {
                    if (localMode !== 'host') return;
                    if (!state) {
                        incoming.on('open', () => incoming.send({ type: 'reject', message: 'Not initialized.' }));
                        incoming.on('open', () => incoming.close());
                        return;
                    }
                    const previousConnection = guestConnections.get(incoming.peer);
                    if (previousConnection && previousConnection !== incoming) {
                        try { previousConnection.close(); } catch (error) { }
                    }
                    guestConnections.set(incoming.peer, incoming);
                    wireConnectionHandlers(incoming);
                });
                peer.on('error', (error) => {
                    if (error.type === 'unavailable-id') {
                        suppressLocalPeerClose = true;
                        try { peer.destroy(); } catch (destroyError) { }
                        peer = null;
                        window.setTimeout(() => { suppressLocalPeerClose = false; }, 0);
                        setConnectionLabel(i18n('msgRoomSyncing'));
                        window.setTimeout(() => {
                            if (localMode === 'host' && hostTakeoverInProgress) {
                                startHostTakeoverPeer();
                            }
                        }, 900);
                        return;
                    }
                    hostTakeoverInProgress = false;
                    showToast(`Error: ${error.type || error.message}`);
                });
            };

            startHostTakeoverPeer();
        }

        function handleGuestHostDisconnect() {
            if (localMode !== 'guest') return;
            if (!state) {
                setConnectionLabel(i18n('msgRoomSyncing'));
                scheduleGuestReconnect(1200);
                return;
            }

            const lostHostId = (state && state.hostPeerId) || roomId;
            const lostHost = getParticipantById(lostHostId);
            const isHostSeated = Boolean(lostHost && (lostHost.seat === 'black' || lostHost.seat === 'white'));
            const shouldPreserveHost = Boolean(
                lostHost && isHostSeated && state.status === 'playing' && (state.moves || []).length > 0
            );

            if (lostHost && shouldPreserveHost) {
                if (!lostHost.disconnectedAt) {
                    lostHost.disconnectedAt = Date.now();
                    lostHost.disconnectedUntil = lostHost.disconnectedAt + DISCONNECT_GRACE_MS;
                    pauseMatchForDisconnect(lostHost.id);
                    addLog('presence', i18n('msgDisconnected', lostHost.name));
                }
            } else if (lostHost) {
                removeParticipant(lostHost.id, i18n('msgLeft', lostHost.name));
            }

            const nextHostPeerId = getNextHostCandidatePeerId(lostHostId);
            if (!nextHostPeerId) {
                setConnectionLabel(i18n('msgRoomSyncing'));
                scheduleGuestReconnect(1200);
                render();
                return;
            }

            setHostPeerId(nextHostPeerId);

            if (nextHostPeerId === localPeerId) {
                beginHostTakeover(lostHostId);
            } else {
                setConnectionLabel(i18n('msgRoomSyncing'));
                scheduleGuestReconnect();
            }
            render();
        }

        function formatTime(ms) {
            const safe = Math.max(0, ms);
            const minutes = Math.floor(safe / 60000);
            const seconds = Math.floor((safe % 60000) / 1000);
            return `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
        }

        function getDisplayRemainingMs(peerId) {
            if (!state || !peerId) return 0;
            const base = state.clocks.remainingMsByPeerId[peerId] ?? state.config.baseSeconds * 1000;
            if (state.status !== 'playing' || state.clocks.activePeerId !== peerId || !state.clocks.activeStartedAt) {
                return base;
            }
            return Math.max(0, base - (Date.now() - state.clocks.activeStartedAt));
        }

        function applyElapsedTime(timestamp = Date.now()) {
            if (!state || state.status !== 'playing') return;
            const activePeerId = state.clocks.activePeerId;
            const startedAt = state.clocks.activeStartedAt;
            if (!activePeerId || !startedAt) return;
            const elapsed = Math.max(0, timestamp - startedAt);
            state.clocks.remainingMsByPeerId[activePeerId] = Math.max(
                0,
                (state.clocks.remainingMsByPeerId[activePeerId] ?? 0) - elapsed
            );
            state.clocks.activeStartedAt = timestamp;
        }

        function startClockFor(peerId, timestamp = Date.now()) {
            if (!state || !peerId) {
                stopClock();
                return;
            }
            state.status = 'playing';
            state.clocks.activePeerId = peerId;
            state.clocks.activeStartedAt = timestamp;
        }

        function stopClock() {
            if (!state) return;
            state.clocks.activePeerId = null;
            state.clocks.activeStartedAt = null;
        }

        function grantIncrement(peerId) {
            if (!state || !peerId) return;
            const increment = state.config.incrementSeconds * 1000;
            state.clocks.remainingMsByPeerId[peerId] = (state.clocks.remainingMsByPeerId[peerId] ?? 0) + increment;
        }

        function swapColors() {
            const blackPeerId = getBlackPeerId();
            const whitePeerId = getWhitePeerId();
            if (!blackPeerId || !whitePeerId) return;
            state.seats.black = whitePeerId;
            state.seats.white = blackPeerId;
            if (state.participantsById[blackPeerId]) {
                state.participantsById[blackPeerId].seat = 'white';
            }
            if (state.participantsById[whitePeerId]) {
                state.participantsById[whitePeerId].seat = 'black';
            }
            rebuildColors();
        }

        function getImplicitMovePhase(phase) {
            switch (phase) {
                case 'swap-after-1': return 'opening-move-2';
                case 'swap-after-2': return 'opening-move-3';
                case 'swap-after-3': return 'opening-move-4';
                case 'swap-after-4': return 'opening-move-5-choice1';
                case 'swap-after-5': return 'opening-move-6-choice1';
                default: return '';
            }
        }

        function phaseDescriptor() {
            if (!state) {
                return {
                    label: '',
                    detail: '',
                    actorPeerId: '',
                    allowBoardAction: false,
                    boardActionKind: '',
                    constraint: null,
                };
            }
            if (hasDisconnectedSeatedPlayer()) {
                return { actorPeerId: '', allowBoardAction: false, boardActionKind: '', constraint: null };
            }

            const blackPeerId = getBlackPeerId();
            const whitePeerId = getWhitePeerId();
            const lastMove = state.moves[state.moves.length - 1];

            switch (state.phase) {
                case 'waiting-guest':
                    return { actorPeerId: '', allowBoardAction: false, boardActionKind: '', constraint: null };
                case 'opening-move-1':
                    return { actorPeerId: blackPeerId, allowBoardAction: true, boardActionKind: 'move', constraint: { kind: 'center' } };
                case 'swap-after-1':
                case 'swap-after-2':
                case 'swap-after-3':
                case 'swap-after-5': {
                    const implicitPhase = getImplicitMovePhase(state.phase);
                    const currentActorPeerId = lastMove ? getOpponentPeerId(lastMove.peerId) : '';
                    const savedPhase = state.phase;
                    state.phase = implicitPhase;
                    const implicitDescriptor = phaseDescriptor();
                    state.phase = savedPhase;
                    const actorPeerId = lastMove ? getOpponentPeerId(lastMove.peerId) : '';
                    return {
                        actorPeerId,
                        allowBoardAction: Boolean(currentActorPeerId && implicitPhase),
                        boardActionKind: implicitPhase ? 'move' : '',
                        constraint: implicitDescriptor.constraint,
                    };
                }
                case 'swap-after-4': {
                    const implicitPhase = getImplicitMovePhase(state.phase);
                    const savedPhase = state.phase;
                    state.phase = implicitPhase;
                    const implicitDescriptor = phaseDescriptor();
                    state.phase = savedPhase;
                    return {
                        actorPeerId: blackPeerId,
                        allowBoardAction: true,
                        boardActionKind: 'move',
                        constraint: implicitDescriptor.constraint,
                    };
                }
                case 'opening-move-2':
                    return { actorPeerId: whitePeerId, allowBoardAction: true, boardActionKind: 'move', constraint: { kind: 'square', radius: 1 } };
                case 'opening-move-3':
                    return { actorPeerId: blackPeerId, allowBoardAction: true, boardActionKind: 'move', constraint: { kind: 'square', radius: 2 } };
                case 'opening-move-4':
                    return { actorPeerId: whitePeerId, allowBoardAction: true, boardActionKind: 'move', constraint: { kind: 'square', radius: 3 } };
                case 'opening-move-5-choice1':
                    return { actorPeerId: blackPeerId, allowBoardAction: true, boardActionKind: 'move', constraint: { kind: 'square', radius: 4 } };
                case 'opening-move-6-choice1':
                    return { actorPeerId: whitePeerId, allowBoardAction: true, boardActionKind: 'move', constraint: { kind: 'anywhere' } };
                case 'offering-choice2':
                    return { actorPeerId: blackPeerId, allowBoardAction: true, boardActionKind: 'offer', constraint: { kind: 'offer-set' } };
                case 'select-offer':
                    return { actorPeerId: whitePeerId, allowBoardAction: true, boardActionKind: 'select-offer', constraint: { kind: 'select-offer' } };
                case 'opening-move-6-choice2':
                    return { actorPeerId: whitePeerId, allowBoardAction: true, boardActionKind: 'move', constraint: { kind: 'anywhere' } };
                case 'regular': {
                    const actorPeerId = lastMove ? getOpponentPeerId(lastMove.peerId) : blackPeerId;
                    return { actorPeerId, allowBoardAction: true, boardActionKind: 'move', constraint: { kind: 'anywhere' } };
                }
                case 'finished':
                    return { actorPeerId: '', allowBoardAction: false, boardActionKind: '', constraint: null };
                default:
                    return { actorPeerId: '', allowBoardAction: false, boardActionKind: '', constraint: null };
            }
        }

        function setPhase(nextPhase, timestamp = Date.now()) {
            if (!state) return;
            state.phase = nextPhase;
            if (nextPhase === 'waiting-guest') {
                state.status = 'waiting';
                stopClock();
                return;
            }
            if (nextPhase === 'finished') {
                state.status = 'finished';
                stopClock();
                return;
            }
            state.status = 'playing';
            const descriptor = phaseDescriptor();
            if (descriptor.actorPeerId) {
                startClockFor(descriptor.actorPeerId, timestamp);
            } else {
                stopClock();
            }
        }

        function maybeStartMatch() {
            if (!state || !['waiting-guest', 'finished'].includes(state.phase) || !bothPlayersReady() || !seatedPlayersMarkedReady()) return;
            clearBoardForNewMatch();
            resetReadyFlags();
            setPhase('opening-move-1');
        }

        function isOccupied(x, y) {
            return state?.moves?.some((move) => move.x === x && move.y === y) || false;
        }

        function isInsideCenteredSquare(x, y, radius) {
            return Math.abs(x - CENTER) <= radius && Math.abs(y - CENTER) <= radius;
        }

        function validateMoveConstraint(constraint, x, y) {
            if (!constraint || constraint.kind === 'anywhere') return true;
            if (constraint.kind === 'center') return x === CENTER && y === CENTER;
            if (constraint.kind === 'square') return isInsideCenteredSquare(x, y, constraint.radius);
            return true;
        }

        function getShapeHash(moves) {
            let minHash = null;
            for (let i = 0; i < 8; i++) {
                const transformed = moves.map(m => {
                    let tx, ty;
                    switch (i) {
                        case 0: tx = m.x; ty = m.y; break;
                        case 1: tx = -m.y; ty = m.x; break;
                        case 2: tx = -m.x; ty = -m.y; break;
                        case 3: tx = m.y; ty = -m.x; break;
                        case 4: tx = -m.x; ty = m.y; break;
                        case 5: tx = m.y; ty = m.x; break;
                        case 6: tx = m.x; ty = -m.y; break;
                        case 7: tx = -m.y; ty = -m.x; break;
                    }
                    return { x: tx, y: ty, color: m.color };
                });

                let minX = Infinity;
                let minY = Infinity;
                for (const m of transformed) {
                    if (m.x < minX) minX = m.x;
                    if (m.y < minY) minY = m.y;
                }

                const normalized = transformed.map(m => ({
                    x: m.x - minX,
                    y: m.y - minY,
                    color: m.color
                }));
